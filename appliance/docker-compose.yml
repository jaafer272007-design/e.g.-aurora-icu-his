# AURORA ON-PREMISES APPLIANCE — Phase 2 (design §2.2)
#
# THE VALIDATOR'S TESTBED, NOT A HOSPITAL PRODUCT (design §2.4): this
# compose still seeds DEMO data (APPLIANCE_ENV defaults to staging — the
# locked seed rules make demo data structurally impossible under
# APP_ENV=production, and Phase 2 explicitly ships no first-run wizard,
# no production seed split and no backup). A hospital must not receive
# this build. What Phase 2 proves is the TOPOLOGY hospitals will run:
# one server, one origin, Postgres persistence, a local model, devices
# on the network.
#
# One command brings it up: ./run.sh (Linux/macOS) or .\run.ps1
# (Windows). The run script generates secrets into appliance/.env
# (never committed, never baked into an image), fetches + sha256-verifies
# the model file, detects the GPU, and picks the right profiles.
#
# Services:
#   aurora    — the Phase 1 image: ASP.NET API + the React build in
#               wwwroot, ONE origin (built from ../server/Dockerfile)
#   postgres  — the system of record; NAMED VOLUME aurora-pgdata (the
#               hospital never installs Postgres; data survives restarts
#               and image updates)
#   llama     — the local model runtime (profile "ai" — only started
#               when the AI is enabled): llama.cpp `llama-server`, the
#               runtime the grounded-query eval VERIFIED to grammar-
#               enforce tool_choice=required. The model is a GGUF file
#               mounted READ-ONLY from ./models — shipped ALONGSIDE the
#               package, never a Docker layer (the 4.7 GB flag, §2.2).
#
# GPU (design §2.3 — warn and disable, never refuse): with an NVIDIA
# GPU the run script adds docker-compose.gpu.yml and the "ai" profile.
# Without one it starts Aurora WITHOUT the llama service and sets
# AI_UNAVAILABLE_REASON so the AI screen says WHY. The HIS never stops
# because of the AI.

name: aurora-appliance

services:
  aurora:
    build:
      context: ..
      dockerfile: server/Dockerfile
      # staging bundle by default — matches APPLIANCE_ENV below; the
      # EnvironmentGate refuses a bundle/server environment mismatch,
      # so the two MUST move together (run script keeps them in step)
      args:
        VITE_APP_ENV: ${APPLIANCE_ENV:-staging}
    image: aurora-icu:${AURORA_TAG:-appliance}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # 0.0.0.0 — devices on the LAN reach the appliance (the hospital
      # topology in miniature: server on the premises, browsers on the
      # network)
      - "${AURORA_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APPLIANCE_ENV:-staging}
      DATABASE_URL: postgres://aurora:${POSTGRES_PASSWORD}@postgres:5432/aurora
      JWT_SECRET: ${JWT_SECRET}
      # /healthz + /build.txt stamp — the run script passes the packaged
      # commit (env name is historical from the Render tier; the value is
      # simply "the git commit this build carries")
      RENDER_GIT_COMMIT: ${AURORA_BUILD_COMMIT:-dev}
      # AI wiring — written by the run script:
      #   GPU present : AI_PROVIDER=openai, AI_ENDPOINT=http://llama:8081/v1
      #   GPU absent  : AI_PROVIDER=none + AI_UNAVAILABLE_REASON (the
      #                 honest 503 — "say WHY, never a bare 503")
      AI_PROVIDER: ${AI_PROVIDER:-none}
      AI_ENDPOINT: ${AI_ENDPOINT:-}
      AI_MODEL: ${AI_MODEL:-qwen2.5-7b-instruct-q4_k_m}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-120}
      AI_UNAVAILABLE_REASON: ${AI_UNAVAILABLE_REASON:-}
      # production-flavor preview only (see README — known-refusing):
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      FORMULARY_SEED: ${FORMULARY_SEED:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
    healthcheck:
      # the aspnet runtime image ships no curl/wget — a bash /dev/tcp
      # probe checks the listener without touching the image; the run
      # script and Package CI assert the real /healthz from outside
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080 && exec 3<&- 3>&-"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aurora
    volumes:
      - aurora-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora -d aurora"]
      interval: 5s
      timeout: 3s
      retries: 20

  llama:
    profiles: ["ai"]
    build:
      context: ./llama
      # runtime-cpu (testing; slow — the eval measured 60–63 s cold on
      # 4 vCPU) or runtime-cuda (the 4060 path) — the run script sets
      # LLAMA_RUNTIME to match the detected hardware
      target: runtime-${LLAMA_RUNTIME:-cpu}
    image: aurora-llama:${LLAMA_RUNTIME:-cpu}
    restart: unless-stopped
    volumes:
      # the model ships ALONGSIDE as a file — never an image layer
      - ./models:/models:ro
    command: >
      --model /models/qwen2.5-7b-instruct-q4_k_m-00001-of-00002.gguf
      --jinja --host 0.0.0.0 --port 8081
      --ctx-size 8192 --temp 0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 300s

volumes:
  aurora-pgdata:
