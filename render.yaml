# Render blueprint — declarative config for the "ICU" web service
# (Stage 10 Phase 1). Docker-based so the hosting choice stays swappable;
# free plan (cold starts after ~15 min idle are expected and documented —
# the frontend roster adapter falls back to mock data while the service
# wakes).
#
# OPERATIONAL CONSTRAINT — free-tier Postgres EXPIRY (verified against the
# Render changelog): free databases EXPIRE 30 DAYS after creation (the
# policy changed 2024-05-20; it was 90 days before that), with a 14-day
# grace period to upgrade to a paid instance before Render DELETES the
# database and all its data. Render emails before expiry and again before
# deletion. 1 GB fixed storage; one free database per workspace. At
# expiry the service loses its DB: boot-time Migrate() fails, /healthz
# goes down, and the frontend falls back to mock data (never a broken
# UI). Recovery paths: upgrade the database plan (data kept), or create
# a fresh free database and update the blueprint (data LOST — the seed
# files repopulate baseline data on first boot, but real writes are
# gone). See CLAUDE.md "Database persistence".
# BUILD CONTEXT (the deployed-suite gate depends on this): [superseded
# 2026-07-17, appliance Phase 1 — the original rule was "Render rebuilds
# only for commits touching rootDir server/"]. The build context is now
# the REPO ROOT (dockerfilePath server/Dockerfile, no rootDir) because
# the image carries the frontend in wwwroot, whose sources live outside
# server/. The buildFilter below reproduces the old rebuild economy:
# only the listed paths (the image's actual inputs) trigger a rebuild —
# docs-only merges still deploy nothing. The deployed E2E suites' gate
# is UNCHANGED and still valid: it asserts SERVER content equality
# (git tree/blob comparison of server/ + render.yaml), which is what the
# API assertions depend on; the frontend now in the image has its OWN
# freshness probe (/build.txt == /healthz build, asserted by the
# deployed-frontend suite). This file syncs the Blueprint on change.
databases:
  - name: aurora-db
    plan: free

services:
  - type: web
    name: ICU
    runtime: docker
    repo: https://github.com/jaafer272007-design/e.g.-aurora-icu-his
    branch: main
    dockerfilePath: ./server/Dockerfile
    buildFilter:
      paths:
        - server/**
        - src/**
        - public/**
        - index.html
        - package.json
        - package-lock.json
        - vite.config.ts
        - tsconfig.json
        - tsconfig.app.json
        - tsconfig.node.json
        - render.yaml
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # ENVIRONMENT IDENTITY (environment-separation §11 step 1): this
      # deployed cloud tier IS the staging environment per the merged
      # design — the whole current stack (Pages + this service + the free
      # Postgres) was redesignated staging wholesale. /healthz reports
      # this value and every data-writing suite asserts it before any
      # write leg. A future production install sets APP_ENV=production
      # through the same variable (compose env file), no code change.
      - key: APP_ENV
        value: staging
      - key: CORS_ORIGINS
        value: https://jaafer272007-design.github.io
      # JWT signing secret (Stage 10 Phase 2) — generated by Render, never
      # in the repo. If unset the service falls back to a random per-boot
      # key (tokens then expire on every restart, acceptable for the demo).
      - key: JWT_SECRET
        generateValue: true
      # Postgres connection (Stage 10 — database persistence). Wired from
      # the blueprint database above — the connection string exists ONLY in
      # Render's environment, never in the repo. Without it the service
      # boots the ephemeral SQLite demo mode (loudly logged at startup).
      - key: DATABASE_URL
        fromDatabase:
          name: aurora-db
          property: connectionString
