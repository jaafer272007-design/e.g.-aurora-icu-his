# Render blueprint — declarative config for the "ICU" web service
# (Stage 10 Phase 1). Docker-based so the hosting choice stays swappable;
# free plan (cold starts after ~15 min idle are expected and documented —
# the frontend roster adapter falls back to mock data while the service
# wakes).
#
# OPERATIONAL CONSTRAINT — free-tier Postgres EXPIRY (verified against the
# Render changelog): free databases EXPIRE 30 DAYS after creation (the
# policy changed 2024-05-20; it was 90 days before that), with a 14-day
# grace period to upgrade to a paid instance before Render DELETES the
# database and all its data. Render emails before expiry and again before
# deletion. 1 GB fixed storage; one free database per workspace. At
# expiry the service loses its DB: boot-time Migrate() fails, /healthz
# goes down, and the frontend falls back to mock data (never a broken
# UI). Recovery paths: upgrade the database plan (data kept), or create
# a fresh free database and update the blueprint (data LOST — the seed
# files repopulate baseline data on first boot, but real writes are
# gone). See CLAUDE.md "Database persistence".
# BUILD CONTEXT (the deployed-suite gate depends on this): Render
# rebuilds this service only for commits touching rootDir server/ (the
# Dockerfile lives inside it) — and, for THIS FILE, syncs the Blueprint
# on change. Every deployed E2E suite's warm-up asserts the deployed
# build's server content equals the dispatched ref's (git tree/blob
# comparison of server/ + render.yaml). This comment block also serves
# as the 2026-07-10 empirical probe of whether a render.yaml-only
# commit triggers a redeploy under rootDir — see CLAUDE.md "The stale
# gate's dead zone".
databases:
  - name: aurora-db
    plan: free

services:
  - type: web
    name: ICU
    runtime: docker
    repo: https://github.com/jaafer272007-design/e.g.-aurora-icu-his
    branch: main
    rootDir: server
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: CORS_ORIGINS
        value: https://jaafer272007-design.github.io
      # JWT signing secret (Stage 10 Phase 2) — generated by Render, never
      # in the repo. If unset the service falls back to a random per-boot
      # key (tokens then expire on every restart, acceptable for the demo).
      - key: JWT_SECRET
        generateValue: true
      # Postgres connection (Stage 10 — database persistence). Wired from
      # the blueprint database above — the connection string exists ONLY in
      # Render's environment, never in the repo. Without it the service
      # boots the ephemeral SQLite demo mode (loudly logged at startup).
      - key: DATABASE_URL
        fromDatabase:
          name: aurora-db
          property: connectionString
