# TEMPORARY read-only diagnosis (Recently Discharged investigation) —
# dispatched from the fix branch, REMOVED before the PR is finalized.
# Reads only: no write leg exists in this workflow.
name: TEMP Discharge Panel Audit (read-only)
on: workflow_dispatch

env:
  API: https://icu-cp49.onrender.com
  EXPECTED_ENV: staging

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Environment identity (read-only discipline still asserts the target)
        run: |
          got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("environment","<absent>"), d.get("build","")[:9])')
          echo "healthz: $got"
          [ "${got%% *}" = "$EXPECTED_ENV" ] || { echo "WRONG ENVIRONMENT"; exit 1; }

      - name: Fetch the encounter lists and inspect the four audit-closed encounters
        run: |
          TOKEN=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"sara.rahman","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["token"])')
          curl -sf -H "Authorization: Bearer $TOKEN" "$API/api/icu/adt/encounters" -o /tmp/all.json
          curl -sf -H "Authorization: Bearer $TOKEN" "$API/api/icu/adt/encounters?status=discharged" -o /tmp/disch.json
          python3 <<'PY'
          import json
          all_ = json.load(open('/tmp/all.json'))
          disch = json.load(open('/tmp/disch.json'))
          print(f"total encounters: {len(all_)} · discharged: {len(disch)}")
          print("\n--- the exact rows for ENC-1193 / 1198 / 1202..1210 (from the UNFILTERED list) ---")
          for e in all_:
              n = e["encounterId"]
              if n in {f"ENC-{i}" for i in list(range(1202, 1211)) + [1193, 1198]}:
                  print(f'{n}: status={e["status"]!r} dischargedAt={e.get("dischargedAt")!r} '
                        f'dischargedBy={e.get("dischargedBy")!r} admittedAt={e.get("admittedAt")!r} '
                        f'patient={e["patientId"]} {e["patientName"]!r}')
          print("\n--- what the panel renders: reverse(discharged) top 14 (server order preserved) ---")
          for e in list(reversed(disch))[:14]:
              print(f'{e["encounterId"]}: dischargedAt={e.get("dischargedAt")!r} {e["patientName"]!r}')
          print("\n--- discharged list: last 20 in SERVER order (the response tail the panel reverses) ---")
          for e in disch[-20:]:
              print(f'{e["encounterId"]}: dischargedAt={e.get("dischargedAt")!r}')
          print("\n--- stamp-format census over ALL discharged (dated vs legacy vs absent) ---")
          dated = sum(1 for e in disch if len(e.get("dischargedAt") or "") >= 16)
          legacy = sum(1 for e in disch if 0 < len(e.get("dischargedAt") or "") < 16)
          absent = sum(1 for e in disch if not e.get("dischargedAt"))
          print(f"dated={dated} legacy(HH:mm)={legacy} absent={absent}")
          PY
