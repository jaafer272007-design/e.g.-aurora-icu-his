# TEMPORARY read-only check (removed in the next commit — never merges):
# directly confirms, after the PR #91 redeploy, that (a) the new `acvpu`
# observation type reached the STAGING catalogue (seed-if-missing top-up)
# and (b) the fabricated roster sofa/ews are gone from the live wire — which
# also proves the DropRosterSofaEws migration applied on boot. Read-only, so
# no environment-write gate. The permanent redeploy proof is the
# deployed-observations-e2e content gate; this is the direct, human-readable
# confirmation for the owner.
name: TEMP check NEWS2 pieces on staging
on:
  push:
    paths:
      - '.github/workflows/tmp-check-news2-staging.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm acvpu in the catalogue + roster wire has no sofa/ews
        run: |
          API=https://icu-cp49.onrender.com
          env=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo unreachable)
          echo "healthz environment: $env"
          t=$(curl -sf -X POST "$API/api/auth/login" -H 'Content-Type: application/json' \
            -d '{"username":"sara.rahman","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          curl -sf -H "Authorization: Bearer $t" "$API/api/icu/observations/catalog" > /tmp/cat.json
          curl -sf -H "Authorization: Bearer $t" "$API/api/icu/patients" > /tmp/roster.json
          python3 - <<'PY'
          import json
          cat = json.load(open("/tmp/cat.json"))
          types = [t for g in cat for t in g.get("types", [])]
          rs = [t for t in types if t.get("typeCode") == "acvpu"]
          assert rs, "acvpu NOT found in the live staging catalogue"
          t = rs[0]
          assert t.get("groupCode") == "neuro", t
          assert t.get("valueType") == "enum" and t.get("allowedValues") == ["Alert","Confusion","Voice","Pain","Unresponsive"], t
          print(f"CONFIRMED acvpu on staging: group '{t['groupCode']}' · {t.get('displayName')} · enum {t['allowedValues']}")

          roster = json.load(open("/tmp/roster.json"))
          bad = [r.get("patientId") for r in roster if ("sofa" in r or "ews" in r)]
          assert not bad, f"roster wire STILL carries sofa/ews for: {bad}"
          print(f"CONFIRMED roster wire clean on staging: {len(roster)} records, none carry sofa/ews (DropRosterSofaEws applied)")
          PY
