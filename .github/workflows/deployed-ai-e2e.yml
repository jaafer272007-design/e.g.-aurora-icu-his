# Deployed AI E2E — verifies the LIVE Render service (Stage 10 Phase 3, the
# FINAL domain: AI Clinical Assistant). Authenticated reads return the real
# ranking + per-patient risk profiles, unauthenticated is 401, the domain is
# read-only for EVERY role (both doctor and nurse read 200 — no mutations, no
# RBAC surface), malformed/unknown query params are 400 (never a silent 200,
# never a 500), and risk trend/delta are COMPUTED at read (present on the wire,
# absent from what is stored). Dispatch manually after merging /server to main.
#
# IDEMPOTENT BY DESIGN: the AI domain is entirely read-only — there are no
# mutations, so every assertion is a stable read against the seeded data and
# the workflow can be re-dispatched any number of times against the ephemeral
# DB with identical results.
name: Deployed AI E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Unauthenticated AI reads → 401
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/ai/ranking")
          echo "GET /ai/ranking (no token) -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/ai/risks?patientId=P-1001")
          echo "GET /ai/risks (no token) -> HTTP $rc"; [ "$rc" = "401" ] || exit 1

      - name: Both roles READ the unit ranking; seeded patients present + trend computed (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $NUR" -H "Origin: $PAGES_ORIGIN" "$API/api/icu/ai/ranking" -o /tmp/rank.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/rank.json"))
          ids={r["patientId"] for r in d}
          seeded={"P-1001","P-1004","P-1007","P-1012"}
          assert seeded<=ids, f"seeded scored patients missing: {seeded-ids}"
          # ranking is sorted by highest current risk, descending
          pcts=[r["top"]["probability"] for r in d]
          assert pcts==sorted(pcts, reverse=True), f"ranking not sorted desc: {pcts}"
          # trend + delta are DERIVED at read — present on every ranked risk
          for r in d:
            assert r["top"]["trend"] in ("rising","falling","stable"), r
            assert isinstance(r["top"]["delta"], int), r
          print(f"ranking rows: {len(d)} (seeded present, sorted desc, trend/delta computed)")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/ranking")
          echo "doctor ranking read -> HTTP $rc"; [ "$rc" = "200" ] || exit 1

      - name: Both roles READ a per-patient profile (trend history + factors)
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks?patientId=P-1001" -o /tmp/prof.json
          python3 -c '
          import json; d=json.load(open("/tmp/prof.json"))
          assert d["patientId"]=="P-1001", d
          assert len(d["risks"])>=1, d
          r=d["risks"][0]
          assert len(r["history"])>=2 and r["factors"], r
          # the store keeps only history + probability — never a trend/delta field
          assert "trend" not in r and "delta" not in r, "trend/delta must NOT be stored on a risk"
          nr=len(d["risks"]); nh=len(r["history"]); nf=len(r["factors"])
          print(f"P-1001 profile: {nr} risks, history len {nh}, {nf} factors")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $NUR" "$API/api/icu/ai/risks?patientId=P-1001")
          echo "nurse profile read (read-only for all roles) -> HTTP $rc"; [ "$rc" = "200" ] || exit 1

      - name: Malformed / unknown query params → 400 (never a silent 200, never a 500)
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/ranking?foo=1")
          echo "ranking unknown param -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks?patientId=P-1001&foo=1")
          echo "risks unknown param -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks")
          echo "risks missing patientId -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # unknown patientId → 400 naming the field (never a silent 200)
          body=$(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks?patientId=P-9999")
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks?patientId=P-9999")
          echo "risks bad patientId -> HTTP $rc body=$body"
          [ "$rc" = "400" ] || exit 1
          echo "$body" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert "patientId" in d["error"], d; print("400 names the field:", d["error"])'
