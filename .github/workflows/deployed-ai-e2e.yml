# Deployed AI E2E — verifies the LIVE Render service's AI GROUNDED QUERY
# contract (the grounded-query-chat rework: the fabricated risk domain is
# DELETED — this suite proves it stays deleted). Two endpoints:
# POST /api/icu/ai/query translates a natural-language question into a
# structured tool call (the LLM emits a QUERY, never a FACT) and audits
# the question; it NEVER executes reads and its response carries no
# patient data. POST /api/icu/ai/interpret (the interpretation layer —
# owner's 2026-07-18 decision) returns ONE text of labeled commentary
# over a data snapshot the CLIENT fetched and rendered; it reads no
# patient rows and its contract has no field besides that text.
# Asserted here:
#   - the retired simulation endpoints (/ai/ranking, /ai/risks) are 404
#   - unauthenticated query/interpret is 401; a clerk (no ai.view) is 403
#   - validation is loud: empty/oversized question, missing snapshot and
#     unknown fields 400
#   - each response is EITHER an honest 503 "no model configured"
#     (staging has no AI_PROVIDER by default) OR, when a provider is
#     configured, a 200 matching the closed contract — tool/args/
#     unanswerable for query, text for interpret — never any other field
# Dispatch manually after merging /server to main.
#
# IDEMPOTENT BY DESIGN: the suite only writes AiQueries audit rows (an
# append-only access log — every accepted question is MEANT to leave a
# row), so it can be re-dispatched any number of times.
name: Deployed AI E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor, nurse and clerk
        run: |
          for u in sara.rahman maya.chen huda.nasser; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
              huda.nasser) echo "CLK=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: THE SIMULATION STAYS DELETED — retired risk endpoints are 404
        run: |
          # the fabricated ranking + per-patient risk profiles were removed
          # (not disabled, not labelled) — an authenticated doctor gets 404
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/ranking")
          echo "GET /ai/ranking (doctor) -> HTTP $rc"; [ "$rc" = "404" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/ai/risks?patientId=P-1001")
          echo "GET /ai/risks (doctor) -> HTTP $rc"; [ "$rc" = "404" ] || exit 1

      - name: Unauthenticated query → 401; clerk (no ai.view) → 403
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/query" \
            -H "Content-Type: application/json" -d '{"question":"who is in the unit"}')
          echo "POST /ai/query (no token) -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          body=$(curl -s -X POST "$API/api/icu/ai/query" -H "Authorization: Bearer $CLK" \
            -H "Content-Type: application/json" -d '{"question":"who is in the unit"}')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/query" -H "Authorization: Bearer $CLK" \
            -H "Content-Type: application/json" -d '{"question":"who is in the unit"}')
          echo "POST /ai/query (clerk) -> HTTP $rc body=$body"; [ "$rc" = "403" ] || exit 1

      - name: Validation is loud — empty question, oversized question, unknown field → 400
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/query" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d '{"question":""}')
          echo "empty question -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          long=$(python3 -c 'print("x"*2001)')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/query" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d "{\"question\":\"$long\"}")
          echo "oversized question -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/query" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d '{"question":"x","bogus":1}')
          echo "unknown field -> HTTP $rc"; [ "$rc" = "400" ] || exit 1

      - name: Query contract — a QUERY or an honest refusal, NEVER a value (+ CORS)
        run: |
          # staging has no AI_PROVIDER by default → the honest 503 "no
          # model configured". If staging ever configures one, the same
          # leg asserts the 200 body carries ONLY tool/args/unanswerable —
          # the response contract has no field that could hold a clinical
          # value, so the model structurally cannot leak one through it.
          for who in DOC NUR; do
            tok=$(eval echo "\$$who")
            rc=$(curl -s -o /tmp/q.json -w '%{http_code}' -D /tmp/h -X POST "$API/api/icu/ai/query" \
              -H "Authorization: Bearer $tok" -H "Origin: $PAGES_ORIGIN" \
              -H "Content-Type: application/json" \
              -d '{"question":"give me all the orders for P-1001"}')
            grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
            echo "$who query -> HTTP $rc: $(cat /tmp/q.json)"
            if [ "$rc" = "503" ]; then
              python3 -c '
          import json; d=json.load(open("/tmp/q.json"))
          assert "no AI model is configured" in d["error"], d
          print("honest no-provider refusal (staging has no model) — nothing translated, nothing accessed")'
            elif [ "$rc" = "200" ]; then
              python3 -c '
          import json; d=json.load(open("/tmp/q.json"))
          assert set(d.keys()) <= {"tool","args","unanswerable"}, f"response contract violated: {sorted(d.keys())}"
          assert d.get("tool") or d.get("unanswerable"), d
          print(f"translated: tool={d.get(\"tool\")} args={d.get(\"args\")} — a QUERY, never a value")'
            else
              echo "unexpected status $rc" && exit 1
            fi
          done

      - name: Interpretation layer — labeled commentary or an honest 503, on a CLOSED one-field contract
        run: |
          # the interpretation layer (owner's 2026-07-18 decision): the
          # endpoint accepts the question + the snapshot the client
          # rendered, and answers with ONE text field of commentary. Same
          # gate pattern as the query leg: staging without a provider →
          # the honest 503; with one → a 200 whose body carries ONLY
          # {text}. RBAC and validation are asserted unconditionally.
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" \
            -H "Content-Type: application/json" -d '{"question":"how is he doing","patient":"x","data":{}}')
          echo "POST /ai/interpret (no token) -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" -H "Authorization: Bearer $CLK" \
            -H "Content-Type: application/json" -d '{"question":"how is he doing","patient":"x","data":{}}')
          echo "POST /ai/interpret (clerk) -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d '{"question":"","patient":"x","data":{}}')
          echo "empty question -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d '{"question":"how is he doing","patient":"x"}')
          echo "missing snapshot -> HTTP $rc (interpretation only ever comments on fetched data)"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" -H "Authorization: Bearer $DOC" \
            -H "Content-Type: application/json" -d '{"question":"x","patient":"x","data":{},"bogus":1}')
          echo "unknown field -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /tmp/i.json -w '%{http_code}' -X POST "$API/api/icu/ai/interpret" \
            -H "Authorization: Bearer $DOC" -H "Origin: $PAGES_ORIGIN" -H "Content-Type: application/json" \
            -d '{"question":"how is this patient doing?","patient":"Test Patient","data":{"scores":{"news2":{"total":4,"max":20}},"latestObservations":[{"time":"2026-07-18 10:00","type":"HR","value":"96","unit":"bpm"}]}}')
          echo "DOC interpret -> HTTP $rc: $(cat /tmp/i.json)"
          if [ "$rc" = "503" ]; then
            python3 -c '
          import json; d=json.load(open("/tmp/i.json"))
          assert "no AI model is configured" in d["error"], d
          print("honest no-provider refusal — no commentary generated, nothing accessed")'
          elif [ "$rc" = "200" ]; then
            python3 -c '
          import json; d=json.load(open("/tmp/i.json"))
          assert set(d.keys()) <= {"text"}, f"interpret contract violated: {sorted(d.keys())}"
          assert isinstance(d.get("text"), str) and d["text"].strip(), d
          print("labeled commentary returned on the closed one-field contract")'
          else
            echo "unexpected status $rc" && exit 1
          fi
