# Deployed Users E2E — verifies the LIVE Render service (Layer 3, Aurora
# Core: user administration). The privilege-escalation safeguards are the
# suite's core assertions: Administrator-only RBAC in BOTH directions
# (doctor/nurse/pharmacist → 403 on EVERY user-management endpoint, and a
# CREATED Doctor-titled account can genuinely sign an order while a
# CREATED Nurse-titled one cannot), every validation rejection (unknown
# field, unknown job title, weak password, clinical title without
# justification, duplicate username), the self-deactivation and
# self-demotion guards, audited actions with the actor ALWAYS from the
# token, deactivation blocking login with the SAME generic 401, and
# password reset never leaking password material. Dispatch manually after
# merging /server changes to main — SEQUENTIALLY with the other suites.
#
# SELF-SUFFICIENT AND IDEMPOTENT (per the finite-seeded-resources rule in
# CLAUDE.md): the run CREATES every user it touches (run-id-unique
# usernames) and never mutates the 20 seeded accounts — the only seeded
# dependency is the read-only admin bootstrap login. The clinical-
# authority proof likewise ADMITS ITS OWN PATIENT (unique MRN, dynamic
# free bed) and discharges it at the end, so the run never depends on
# P-1001/P-1007 remaining admitted (the recorded WARNING). Cleanup
# deactivates all created accounts — no live credentials left active;
# deactivated rows accumulate across runs by design (never a delete —
# that accumulation is the live durability evidence; container-restart
# survival is asserted in local verification).
#
# The LAST-ACTIVE-ADMIN guard is asserted in LOCAL verification only:
# exercising it live would require deactivating seeded admin accounts.
name: Deployed Users E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Bootstrap — seeded SYSTEM ADMINISTRATOR login (read-only dependency) + run-unique names
        run: |
          # users.manage moved to the System Administrator (User Management
          # design) — alex.novak (IT Administrator title) derives that
          # profile; the office Administrator (yusuf.karim) is now 403
          # on every management endpoint (asserted below).
          t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"alex.novak","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          echo "ADM=$t" >> "$GITHUB_ENV"
          off=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"yusuf.karim","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          echo "OFFADM=$off" >> "$GITHUB_ENV"
          { echo "UDOC=e2e.doc.${GITHUB_RUN_ID}"; echo "UNUR=e2e.nur.${GITHUB_RUN_ID}";
            echo "UPHA=e2e.pha.${GITHUB_RUN_ID}"; echo "UADM=e2e.adm.${GITHUB_RUN_ID}";
            echo "UMLT=e2e.mlt.${GITHUB_RUN_ID}";
            echo "MRN=MRN-L3E2E-${GITHUB_RUN_ID}"; } >> "$GITHUB_ENV"
          echo "system administrator token issued; run users e2e.*.${GITHUB_RUN_ID}"

      - name: SysAdmin list works (+ CORS, roles arrays); OFFICE administrator now 403 (moved authority)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $ADM" -H "Origin: $PAGES_ORIGIN" "$API/api/icu/users" -o /tmp/users.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/users.json"))
          assert [u["username"] for u in d]==sorted(u["username"] for u in d), "not sorted"
          assert "passwordHash" not in json.dumps(d), "hash on the wire!"
          seeded=[u for u in d if u["username"]=="yusuf.karim"][0]
          assert seeded["active"] is True, seeded
          assert seeded["roles"]==["Hospital Administrator"], seeded
          print(f"accounts: {len(d)} — every row carries its role SET (seeded = a set of one)")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $OFFADM" "$API/api/icu/users")
          echo "OFFICE administrator list -> HTTP $rc (users.manage/users.view moved to the System Administrator)"
          [ "$rc" = "403" ] || exit 1

      - name: Validation — unknown field / unknown title / weak password / clinical w/o justification → 400
        run: |
          post() { curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' -d "$1" "$API/api/icu/users"; }
          out=$(post '{"username":"'$UADM'","bogus":1}'); echo "unknown field -> $(echo "$out"|tail -1)"; [ "$(echo "$out"|tail -1)" = "400" ] || exit 1
          out=$(post '{"username":"'$UADM'","name":"X","roles":["Wizard"],"initialPassword":"Password1!"}')
          echo "$out" | head -1 | grep -q "not a recognized job title" || exit 1; echo "unknown role -> 400 naming it"
          out=$(post '{"username":"'$UADM'","name":"X","roles":["Pharmacist"],"initialPassword":"short"}')
          echo "$out" | head -1 | grep -q "too weak" || exit 1; echo "weak password -> 400 naming the minimum"
          out=$(post '{"username":"'$UDOC'","name":"X","roles":["Consultant"],"initialPassword":"Password1!"}')
          echo "$out" | head -1 | grep -q "requires a justification" || exit 1; echo "clinical grant w/o justification -> 400"
          out=$(post '{"username":"'$UADM'","name":"X","roles":["IT Administrator"],"initialPassword":"Password1!"}')
          echo "$out" | head -1 | grep -q "System Administrator authority" || exit 1; echo "SysAdmin grant w/o justification -> 400 (flagged decision: allowed WITH justification)"
          out=$(post '{"username":"'$UADM'","name":"X","roles":[],"initialPassword":"Password1!"}')
          echo "$out" | head -1 | grep -q "at least one role" || exit 1; echo "empty role set -> 400"

      - name: Create the run's accounts (actor + ACTIVE ROLE from token; justification audited; pharmacist needs none)
        run: |
          mk() { curl -sf -X POST -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' -d "$1" "$API/api/icu/users"; }
          mk '{"username":"'$UADM'","name":"E2E Admin","roles":["IT Administrator"],"initialPassword":"E2eAdmin99!Tmp","justification":"deployed users E2E — SysAdmin succession proof"}' \
            | python3 -c 'import json,sys,re; d=json.load(sys.stdin); e=d["events"][0]; assert e["actor"]=="Alex Novak" and e["actorRole"]=="IT Administrator" and e["action"]=="created", e; assert re.match(r"\d{4}-\d{2}-\d{2} \d{2}:\d{2}$", e["time"]), e; assert d["mustChangePassword"] is True, d; print("SysAdmin account created (justified) — audit actor + ACTIVE ROLE from token; change forced at first login")'
          mk '{"username":"'$UDOC'","name":"Dr. E2E Doctor","roles":["Consultant"],"initialPassword":"E2eDoctor99!Tmp","justification":"deployed users E2E — clinical authority proof"}' \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); e=d["events"][0]; assert "justification: deployed users E2E" in e["detail"], e; print("doctor account created — justification recorded in the audit")'
          mk '{"username":"'$UNUR'","name":"RN E2E Nurse","roles":["Staff Nurse"],"initialPassword":"E2eNurse99!Tmp","justification":"deployed users E2E — nurse polarity proof"}' >/dev/null && echo "nurse account created"
          mk '{"username":"'$UPHA'","name":"E2E Pharm","roles":["Pharmacist"],"initialPassword":"E2ePharm99!Tmp"}' >/dev/null && echo "pharmacist account created (no justification needed — non-clinical, non-SysAdmin)"
          # the TWO-ROLE account (§1/§2): holds Consultant AND Laboratory Technician
          mk '{"username":"'$UMLT'","name":"Dr. E2E TwoRoles","roles":["Consultant","Laboratory Technician"],"initialPassword":"E2eMulti99!Tmp","justification":"deployed users E2E — multi-role isolation proof"}' \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["roles"]==["Consultant","Laboratory Technician"], d; print("two-role account created")'
          # duplicate username → 400
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"username":"'$UADM'","name":"Dup","roles":["Pharmacist"],"initialPassword":"Password1!"}' "$API/api/icu/users")
          echo "duplicate username -> HTTP $rc"; [ "$rc" = "400" ] || exit 1

      - name: Forced first-login change + RBAC matrix — clinical profiles 403 everywhere; created SysAdmin 200
        run: |
          # first login returns NO session token — only a change step token
          # (§4); completing the change continues the login. tok() proves
          # the whole path for every created single-role account.
          tok() {
            resp=$(curl -sf -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d "{\"username\":\"$1\",\"password\":\"$2Tmp\"}")
            echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("mustChangePassword") is True and "token" not in d, d' >&2
            ct=$(echo "$resp" | python3 -c 'import json,sys;print(json.load(sys.stdin)["changeToken"])')
            curl -sf -X POST "$API/api/auth/change-password" -H 'Content-Type: application/json' \
              -d "{\"token\":\"$ct\",\"newPassword\":\"$2\"}" | python3 -c 'import json,sys;print(json.load(sys.stdin)["token"])'
          }
          DOC=$(tok $UDOC 'E2eDoctor99!'); NUR=$(tok $UNUR 'E2eNurse99!'); PHA=$(tok $UPHA 'E2ePharm99!'); ADM2=$(tok $UADM 'E2eAdmin99!')
          echo "forced change exercised on all four accounts (login gave a change token, never a session)"
          { echo "DOC=$DOC"; echo "NUR=$NUR"; echo "PHA=$PHA"; echo "ADM2=$ADM2"; } >> "$GITHUB_ENV"
          for role in DOC NUR PHA; do
            t=$(eval echo \$$role)
            for probe in "GET|/api/icu/users|" \
              "POST|/api/icu/users|{\"username\":\"x.y.z\",\"name\":\"X\",\"roles\":[\"Intern\"],\"initialPassword\":\"Password1!\",\"justification\":\"j\"}" \
              "PUT|/api/icu/users/$UPHA|{\"name\":\"X\"}" \
              "POST|/api/icu/users/$UPHA/deactivate|" \
              "POST|/api/icu/users/$UPHA/reactivate|" \
              "POST|/api/icu/users/$UPHA/reset-password|{\"newPassword\":\"Password1!\"}"; do
              m=${probe%%|*}; rest=${probe#*|}; path=${rest%%|*}; body=${rest#*|}
              if [ -n "$body" ]; then
                rc=$(curl -s -o /dev/null -w '%{http_code}' -X "$m" -H "Authorization: Bearer $t" -H 'Content-Type: application/json' -d "$body" "$API$path")
              else
                rc=$(curl -s -o /dev/null -w '%{http_code}' -X "$m" -H "Authorization: Bearer $t" "$API$path")
              fi
              echo "$role $m $path -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
            done
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $ADM2" "$API/api/icu/users")
          echo "created ADMIN list -> HTTP $rc"; [ "$rc" = "200" ] || exit 1

      - name: Clinical authority is REAL — created doctor admits + signs; created nurse cannot originate
        run: |
          FREE=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free bed"; print(f[0])')
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$MRN'","nameFirst":"L3","nameSecond":"E2E","nameFamily":"Patient","age":50,"sex":"M","allergies":"None documented","diagnosis":"users E2E authority proof","attending":"Dr. E2E Doctor","bedId":"'$FREE'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/adm.json
          # standalone assignment so a failing assert FAILS THIS STEP —
          # `read VAR <<<"$(…)"` swallowed it (2026-07-10 audit finding)
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/adm.json")); assert d["encounter"]["admittedBy"]=="Dr. E2E Doctor", d; print(d["patient"]["patientId"], d["encounter"]["encounterId"])')
          read PID EID <<<"$vals"
          echo "created doctor admitted $PID ($EID) to $FREE"; { echo "PID=$PID"; echo "EID=$EID"; } >> "$GITHUB_ENV"
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"Layer 3 authority proof","priority":"Routine"}],"sign":true}' \
            "$API/api/icu/orders" | python3 -c 'import json,sys; d=json.load(sys.stdin)[0]; assert d["status"]=="active" and d["orderedBy"]=="Dr. E2E Doctor", d; print("created doctor GENUINELY signed", d["orderId"])'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"x","priority":"Routine"}],"sign":true}' "$API/api/icu/orders")
          echo "created nurse create+sign -> HTTP $rc"; [ "$rc" = "403" ] || exit 1

      - name: Escalation via edit — audited old → new; justification enforced
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"roles":["Consultant"]}' "$API/api/icu/users/$UPHA")
          echo "escalate w/o justification -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          curl -sf -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"roles":["Consultant"],"justification":"deployed users E2E — escalation audit proof"}' "$API/api/icu/users/$UPHA" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); e=[x for x in d["events"] if x["action"]=="roles changed"][0]; assert "[Pharmacist] → [Consultant]" in e["detail"] and e["actor"]=="Alex Novak" and e["actorRole"]=="IT Administrator", e; print("role change audited with actor + ACTIVE ROLE:", e["detail"][:80])'

      - name: Self-guards — created admin cannot deactivate or demote ITSELF
        run: |
          body=$(curl -s -X POST -H "Authorization: Bearer $ADM2" "$API/api/icu/users/$UADM/deactivate")
          echo "$body" | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "cannot deactivate your own account" in e, e; print("self-deactivation blocked:", e)'
          body=$(curl -s -X PUT -H "Authorization: Bearer $ADM2" -H 'Content-Type: application/json' -d '{"roles":["Staff Nurse"],"justification":"x"}' "$API/api/icu/users/$UADM")
          echo "$body" | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "cannot remove the System Administrator role from your own account" in e, e; print("self-role-strip blocked:", e)'

      - name: Deactivation blocks login with the SAME generic 401; reactivation restores
        run: |
          curl -sf -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/$UPHA/deactivate" >/dev/null
          out=$(curl -s -w '\n%{http_code}' -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UPHA'","password":"E2ePharm99!"}')
          echo "deactivated login -> $(echo "$out"|tail -1)"; [ "$(echo "$out"|tail -1)" = "401" ] || exit 1
          echo "$out" | head -1 | grep -q '"Invalid credentials"' || exit 1
          echo "generic body — no account-state oracle"
          # replayed status change = STATE CONFLICT (four-code rule; was 400 pre-convention)
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/$UPHA/deactivate")
          rc=$(echo "$out" | tail -1); echo "re-deactivate -> HTTP $rc (state conflict)"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already deactivated" in e, e'
          curl -sf -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/$UPHA/reactivate" >/dev/null
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/$UPHA/reactivate")
          rc=$(echo "$out" | tail -1); echo "re-reactivate -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already active" in e, e'
          # absent account stays 404 — the other branch
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/ghost.user.${GITHUB_RUN_ID}/deactivate")
          echo "absent account deactivate -> HTTP $rc"; [ "$rc" = "404" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UPHA'","password":"E2ePharm99!"}')
          echo "reactivated login -> HTTP $rc"; [ "$rc" = "200" ] || exit 1

      - name: Password reset — old rejected; the temp credential FORCES a change; audit clean of password material
        run: |
          curl -sf -X POST -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"newPassword":"E2eRotated77!"}' "$API/api/icu/users/$UNUR/reset-password" >/dev/null
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UNUR'","password":"E2eNurse99!"}')
          echo "old password -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          # the temp credential authenticates but yields NO session — only
          # the forced-change step (§4), which then continues the login
          resp=$(curl -sf -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UNUR'","password":"E2eRotated77!"}')
          echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d.get("mustChangePassword") is True and "token" not in d, d; print("temp credential -> forced change, no session token")'
          ct=$(echo "$resp" | python3 -c 'import json,sys;print(json.load(sys.stdin)["changeToken"])')
          curl -sf -X POST "$API/api/auth/change-password" -H 'Content-Type: application/json' \
            -d '{"token":"'$ct'","newPassword":"E2eRotated88!"}' \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["token"] and d["jobTitle"]=="Staff Nurse", d; print("change completed -> session issued (single role, no chooser)")'
          curl -sf -H "Authorization: Bearer $ADM" "$API/api/icu/users" | python3 -c "
          import json,sys; d=json.load(sys.stdin)
          n=[u for u in d if u['username']=='$UNUR'][0]
          assert any(e['action']=='password reset' and e['actor']=='Alex Novak' for e in n['events']), n['events']
          assert any(e['action']=='password changed' for e in n['events']), n['events']
          raw=json.dumps(d)
          assert 'E2eRotated77' not in raw and 'E2eRotated88' not in raw and 'E2eNurse99' not in raw, 'password material on the wire!'
          print('reset + forced change audited; no password material anywhere in the account list')"

      - name: Multi-role login — roles only after the correct password; ONE active role; the OTHER role's permissions ABSENT
        run: |
          # wrong password reveals NOTHING (no roles, no account existence)
          out=$(curl -s -w '\n%{http_code}' -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UMLT'","password":"WrongPass1!"}')
          echo "wrong password -> $(echo "$out"|tail -1)"; [ "$(echo "$out"|tail -1)" = "401" ] || exit 1
          echo "$out" | head -1 | python3 -c 'import json,sys; d=json.load(sys.stdin); assert "roles" not in d and d["error"]=="Invalid credentials", d; print("nothing revealed on a wrong password")'
          # correct TEMP password -> forced change first
          resp=$(curl -sf -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UMLT'","password":"E2eMulti99!Tmp"}')
          ct=$(echo "$resp" | python3 -c 'import json,sys;print(json.load(sys.stdin)["changeToken"])')
          resp=$(curl -sf -X POST "$API/api/auth/change-password" -H 'Content-Type: application/json' -d '{"token":"'$ct'","newPassword":"E2eMulti99!"}')
          # NOW the role list + select token appear — and still NO session
          echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert sorted(d["roles"])==["Consultant","Laboratory Technician"] and "token" not in d and d["selectToken"], d; print("chooser offered AFTER the correct password; no session before a role is chosen")'
          st=$(echo "$resp" | python3 -c 'import json,sys;print(json.load(sys.stdin)["selectToken"])')
          # a role the account does NOT hold -> 400
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/auth/select-role" -H 'Content-Type: application/json' -d '{"token":"'$st'","role":"Staff Nurse"}')
          echo "unheld role -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # act as CONSULTANT: results.create (Ancillary authority) must be ABSENT
          MLT=$(curl -sf -X POST "$API/api/auth/select-role" -H 'Content-Type: application/json' -d '{"token":"'$st'","role":"Consultant"}' \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["jobTitle"]=="Consultant", d; print(d["token"])')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $MLT" -H 'Content-Type: application/json' \
            -d '{}' "$API/api/icu/results/labs")
          echo "acting-as-Consultant results.create -> HTTP $rc (the OTHER held role does NOT leak)"; [ "$rc" = "403" ] || exit 1
          # the SAME person, acting as LAB TECH: the create authority exists
          # (validation may 400 the body — the point is it is NOT 403)
          resp=$(curl -sf -X POST "$API/api/auth/login" -H 'Content-Type: application/json' -d '{"username":"'$UMLT'","password":"E2eMulti99!"}')
          st=$(echo "$resp" | python3 -c 'import json,sys;print(json.load(sys.stdin)["selectToken"])')
          LAB=$(curl -sf -X POST "$API/api/auth/select-role" -H 'Content-Type: application/json' -d '{"token":"'$st'","role":"Laboratory Technician"}' \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["token"])')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $LAB" -H 'Content-Type: application/json' \
            -d '{}' "$API/api/icu/results/labs")
          echo "acting-as-LabTech results.create -> HTTP $rc (authority present; body validation may 400)"; [ "$rc" != "403" ] || exit 1
          # a STEP token is NOT a session: it must fail on a normal endpoint
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $st" "$API/api/icu/users")
          echo "select-step token on an API endpoint -> HTTP $rc (structurally unusable)"; [ "$rc" = "401" ] || exit 1

      - name: Cleanup — discharge the run's patient + deactivate every created account (ASSERTED; runs on failure/cancel too)
        if: always()
        run: |
          # The old version swallowed every failure (`curl && echo` lists +
          # an unconditional final echo) and only ran on success — a mid-run
          # failure leaked an open encounter and ACTIVE credentials while a
          # green step claimed otherwise (2026-07-10 audit). Now: runs on
          # success, failure AND cancellation, every action's outcome is
          # asserted, and the step fails loudly if anything remains live.
          fail=0
          if [ -n "${EID:-}" ] && [ -n "${DOC:-}" ]; then
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge")
            rc=$(echo "$out" | tail -1)
            if [ "$rc" = "200" ]; then echo "discharged $EID (bed freed)"
            elif [ "$rc" = "400" ] && echo "$out" | head -1 | grep -q "already discharged"; then echo "$EID already discharged"
            else echo "FAILED to discharge $EID (HTTP $rc)"; fail=1; fi
          else
            echo "no encounter was created by this run"
          fi
          for u in ${UDOC:-} ${UNUR:-} ${UPHA:-} ${UADM:-} ${UMLT:-}; do
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $ADM" "$API/api/icu/users/$u/deactivate")
            rc=$(echo "$out" | tail -1)
            if [ "$rc" = "200" ]; then echo "deactivated $u"
            elif [ "$rc" = "400" ] && echo "$out" | head -1 | grep -q "already deactivated"; then echo "$u already deactivated"
            elif [ "$rc" = "404" ]; then echo "$u was never created"
            else echo "FAILED to deactivate $u (HTTP $rc)"; fail=1; fi
          done
          [ "$fail" = "0" ] || { echo "CLEANUP INCOMPLETE — live artifacts remain, manual action required"; exit 1; }
          echo "cleanup VERIFIED: no active e2e credentials, no open e2e encounter (deactivated rows accumulate = live durability evidence)"
