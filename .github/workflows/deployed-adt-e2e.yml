# Deployed ADT E2E — verifies the LIVE Render service (Layer 2, Aurora
# Core): the full admit → transfer → discharge lifecycle on the durable
# database, the RBAC matrix in BOTH directions (nurse-403 on admit and
# discharge, doctor-403 on transfer, actor always from the token), every
# validation rejection (occupied bed, duplicate open encounter,
# nonexistent bed and unknown fields → 400; occupied bed, duplicate
# admission, and re-discharge → 409 state conflicts with a precise
# {error}; never a silent 200, never a 500), and Bed-Overview reflection
# (the roster endpoint gains the admission at its bed, moves it on
# transfer, and drops it on discharge). Since the patient-identity-read
# PR the suite also covers GET /adt/patients/{id}: the NO-FORK equality
# proof (identity read == roster identity for the admitted patient),
# IDENTITY SURVIVES DISCHARGE (byte-identical 200 after the roster drops
# the patient — the recorded gap, closed), the DOB path (dateOfBirth
# stored, age COMPUTED at read with birthday-aware math, ageSource
# provenance), the exactly-one-of age/dateOfBirth validation 400s, and
# the absence probe (unknown patient id → 404). Dispatch manually after
# merging /server changes to main — SEQUENTIALLY with the other suites,
# never concurrently (recorded lesson).
#
# IDEMPOTENT UNDER PERSISTENCE BY DESIGN: every run admits a patient with
# a UNIQUE MRN (run id), picks FREE beds dynamically, and discharges its
# own encounter at the end — so the run leaves only closed encounters
# behind and can be re-dispatched forever against the durable DB. The
# run's closed encounter remains queryable afterwards: cross-run
# accumulation under status=discharged is the LIVE durability evidence
# (container-restart survival is asserted in local verification, where
# the container can actually be restarted).
name: Deployed ADT E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Pick two FREE beds for THIS RUN (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $DOC" -H "Origin: $PAGES_ORIGIN" "$API/api/icu/adt/beds" -o /tmp/beds.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          # standalone assignment so a failing assert FAILS THIS STEP —
          # `read VAR <<<"$(…)"` swallowed it (2026-07-10 audit finding)
          vals=$(python3 -c 'import json; free=[b["bedId"] for b in json.load(open("/tmp/beds.json")) if not b.get("patientId")]; assert len(free)>=2, f"need 2 free beds, have {free} — discharge stale encounters"; print(free[0], free[1])')
          read B1 B2 <<<"$vals"
          echo "using free beds $B1, $B2"
          { echo "B1=$B1"; echo "B2=$B2"; } >> "$GITHUB_ENV"

      - name: RBAC — NURSE admit → 403; unauth → 401; unknown field → 400
        run: |
          body='{"nameFirst":"E2E","nameSecond":"ADT","nameFamily":"Patient","age":49,"sex":"F","allergies":"None documented","diagnosis":"deployed ADT E2E","attending":"Dr. E2E","bedId":"'$B1'"}'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/api/icu/adt/admissions" -H 'Content-Type: application/json' -d "$body")
          echo "unauth admit -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/adt/admissions")
          echo "nurse admit -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"bogus":1}' "$API/api/icu/adt/admissions")
          echo "unknown field -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # THE TYPED MRN IS RETIRED (auto-generated MRN): a payload that
          # still carries one fails binding — the exact field that put
          # P-1191's national ID in his MRN slot no longer exists
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"mrn":"MRN-999999","nameFirst":"E2E","nameSecond":"ADT","nameFamily":"Patient","age":49,"sex":"F","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$B1'"}' "$API/api/icu/adt/admissions")
          echo "typed mrn (retired field) -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # IDENTITY REDESIGN validation: exactly ONE of age / dateOfBirth
          # (all three probes fail validation BEFORE any insert)
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"nameFirst":"V","nameSecond":"V","nameFamily":"V","age":50,"dateOfBirth":"1980-01-01","sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$B1'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); echo "age+dateOfBirth -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "not both" || exit 1
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"nameFirst":"V","nameSecond":"V","nameFamily":"V","sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$B1'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); echo "neither age nor dateOfBirth -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "one of dateOfBirth or age is required" || exit 1
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"nameFirst":"V","nameSecond":"V","nameFamily":"V","dateOfBirth":"1990-13-40","sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$B1'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); echo "malformed dateOfBirth -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }

      - name: DOCTOR admits (actor from token) → patient on Bed Overview at the bed
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"E2E","nameSecond":"ADT","nameFamily":"Patient","age":49,"sex":"F","allergies":"None documented","diagnosis":"deployed ADT E2E","attending":"Dr. E2E","bedId":"'$B1'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/adm.json
          # EXPORT BEFORE ASSERTING (leak-prevention, adversarial-review
          # finding): the admission has already created an OPEN encounter
          # — if an assert below fails first, the always() cleanup must
          # still know the ids or the encounter leaks a bed forever.
          # the MRN is AURORA-GENERATED: assert the seeded MRN-######
          # format on the response (the hospital assigns the number — the
          # payload above carried none)
          vals=$(python3 -c 'import json,re; d=json.load(open("/tmp/adm.json")); m=d["patient"]["mrn"]; assert re.fullmatch(r"MRN-\d{6}", m), f"generated MRN off-format: {m}"; print(d["patient"]["patientId"], d["encounter"]["encounterId"], m)')
          read PID EID GENMRN <<<"$vals"
          { echo "PID=$PID"; echo "EID=$EID"; echo "GENMRN=$GENMRN"; } >> "$GITHUB_ENV"
          python3 -c 'import json; d=json.load(open("/tmp/adm.json")); assert d["encounter"]["admittedBy"]=="Dr. Sara Rahman", d'
          echo "admitted $PID encounter $EID by token actor"
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/patients" \
            | python3 -c "import json,sys; r=[x for x in json.load(sys.stdin) if x['patientId']=='$PID']; assert r and r[0]['bedId']=='$B1', r; print('roster shows', r[0]['patientId'], 'at', r[0]['bedId'])"

      - name: PATIENT-IDENTITY READ — same resolver as the roster (no fork); 401/404/400 probes
        run: |
          # GET /adt/patients/{id} — the Core patient-identity read. THE
          # NO-FORK PROOF, live: the identity it serves must equal what
          # the roster serves for the same ADMITTED patient (allergies
          # above all — two read paths must never drift).
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$PID" -o /tmp/idread.json
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/patients" -o /tmp/roster.json
          PID="$PID" python3 -c '
          import json, os
          i = json.load(open("/tmp/idread.json"))
          r = [x for x in json.load(open("/tmp/roster.json")) if x["patientId"] == os.environ["PID"]][0]
          for f in ("mrn", "name", "age", "sex", "allergies"):
              assert i[f] == r[f], (f, i[f], r[f])
          assert i["age"] == 49 and i["ageSource"] == "recordedAtAdmission" and i.get("dateOfBirth") is None, i
          print("NO FORK: identity read == roster identity; age 49 recordedAtAdmission, no fabricated dob")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $NUR" "$API/api/icu/adt/patients/$PID")
          echo "nurse identity read -> HTTP $rc (patients.view on every profile)"; [ "$rc" = "200" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/adt/patients/$PID")
          echo "unauth -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          # ABSENCE PROBE (the coverage lesson): an id that resolves to nothing
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/P-GHOST-$GITHUB_RUN_ID")
          echo "absent patient -> HTTP $rc"; [ "$rc" = "404" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$PID?verbose=1")
          echo "unknown query param -> HTTP $rc"; [ "$rc" = "400" ] || exit 1

      - name: STRUCTURED IDENTITY — retired name field 400; unknown patients admit (no ID, names not unique); duplicate national ID 409; AUDITED identity correction (office Administrator) incl. the MRN (typed canonical / regenerate — the #116 flag resolved)
        run: |
          # office Administrator token (huda.nasser, Receptionist) — the
          # flagged identity-correction authority: registration work,
          # identity is not clinical data
          ADM=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"huda.nasser","password":"Aurora2026!"}' | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          # ONE free bed is enough — the legs cycle it with interleaved
          # discharges (patients persist after discharge, so the
          # uniqueness/identity proofs are unaffected)
          UB1=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" \
            | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free beds"; print(f[0])')
          # the legacy single "name" field is RETIRED (Disallow) → 400
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"name":"Legacy Shape","age":40,"sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$UB1'"}' "$API/api/icu/adt/admissions")
          echo "retired single-name field -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # First/Second/Family are REQUIRED; Third/Fourth optional
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Ali","nameFamily":"AlTest","age":40,"sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$UB1'"}' "$API/api/icu/adt/admissions")
          echo "missing nameSecond -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # UNKNOWN PATIENT #1 — the same five fields, named "unknown" by
          # the admitting user (no special mode), NO national ID
          resp=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Unknown","nameSecond":"Unknown","nameFamily":"Unknown","age":45,"sex":"M","allergies":"None documented","diagnosis":"unidentified trauma","attending":"Dr. E2E","bedId":"'$UB1'"}' \
            "$API/api/icu/adt/admissions")
          UP1=$(echo "$resp" | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["patient"]["name"]=="Unknown Unknown Unknown", d["patient"]; print(d["patient"]["patientId"])')
          UE1=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$UE1/discharge")
          echo "cycle bed (discharge $UE1) -> HTTP $rc"; [ "$rc" = "200" ] || exit 1
          # UNKNOWN PATIENT #2 — SAME names, still no ID: names are NOT
          # unique and absent IDs never collide (unique-when-present);
          # the PATIENT rows coexist — only the bed was cycled
          resp=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Unknown","nameSecond":"Unknown","nameFamily":"Unknown","age":50,"sex":"F","allergies":"None documented","diagnosis":"unidentified","attending":"Dr. E2E","bedId":"'$UB1'"}' \
            "$API/api/icu/adt/admissions")
          UP2=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["patient"]["patientId"])')
          UE2=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          echo "two ID-less Unknown patients admitted: $UP1 + $UP2"
          # release the bed (self-cleanup; correction below is
          # PATIENT-level and works after discharge — identity is not
          # encounter-gated)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$UE2/discharge")
          echo "discharge $UE2 -> HTTP $rc"; [ "$rc" = "200" ] || exit 1
          # RBAC polarity: the DOCTOR may not correct identity (office
          # Administrator authority); the admin without a reason → 400
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nationalId":"NID-'$GITHUB_RUN_ID'","reason":"x"}' "$API/api/icu/adt/patients/$UP1/identity")
          echo "doctor identity correction -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"nationalId":"NID-'$GITHUB_RUN_ID'"}' "$API/api/icu/adt/patients/$UP1/identity")
          echo "correction without reason -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # THE FAMILY ARRIVES: the office Administrator records the real
          # name + national ID + DOB — one audited identity event
          curl -sf -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Karim","nameSecond":"Adnan","nameThird":"Jabbar","nameFamily":"Al-Tamimi","nationalId":"NID-'$GITHUB_RUN_ID'","dateOfBirth":"1979-05-14","reason":"family arrived and identified the patient — identity card presented"}' \
            "$API/api/icu/adt/patients/$UP1/identity" -o /tmp/corr.json
          python3 -c '
          import json; d=json.load(open("/tmp/corr.json"))
          assert d["name"]=="Karim Adnan Al-Tamimi", d["name"]                      # display = First+Second+Family
          assert d["fullName"]=="Karim Adnan Jabbar Al-Tamimi", d["fullName"]      # full legal = all present parts
          assert d["nationalId"].startswith("NID-"), d
          assert d["dateOfBirth"]=="1979-05-14" and d["ageSource"]=="dateOfBirth", d
          ev = d["identity"]; assert len(ev)==1, ev
          assert ev[0]["role"]=="Receptionist" and ev[0]["reason"].startswith("family arrived"), ev
          assert "Unknown Unknown Unknown" in ev[0]["detail"] and "Karim Adnan Jabbar Al-Tamimi" in ev[0]["detail"], ev
          assert "estimated age 45" in ev[0]["detail"], ev                          # the DOB guess is preserved in the diff
          print("identity corrected + audited:", ev[0]["detail"])'
          # DUPLICATE NATIONAL ID at admission → 409 NAMING the conflict
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Test","nameSecond":"Dup","nameFamily":"Id","nationalId":"NID-'$GITHUB_RUN_ID'","age":33,"sex":"M","allergies":"n","diagnosis":"d","attending":"a","bedId":"'$UB1'"}' \
            "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); echo "duplicate national ID -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | UP1="$UP1" python3 -c 'import json,sys,os; e=json.load(sys.stdin)["error"]; assert os.environ["UP1"] in e and "Karim Adnan Al-Tamimi" in e, e; print("precise 409:", e)'
          # the uncorrected Unknown stays honestly unknown (never fabricated)
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$UP2" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["name"]=="Unknown Unknown Unknown" and d.get("nationalId") is None and not d.get("identity"), d; print("second Unknown untouched — no fabricated identity")'
          # ---- MRN CORRECTION on the same audited path (the #116 flag
          # resolved) — safe now that re-admission keys on patientId ----
          # the DOCTOR may not touch the MRN either (same 403 gate, no control)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"regenerateMrn":true,"reason":"x"}' "$API/api/icu/adt/patients/$UP2/identity")
          echo "doctor MRN correction -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          # a NON-CANONICAL typed MRN is refused — free-form entry is the
          # class of error this path removes (probed with the exact
          # P-1191 value: a national ID in the MRN slot)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"mrn":"214313412","reason":"r"}' "$API/api/icu/adt/patients/$UP2/identity")
          echo "non-canonical typed MRN -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # a typed value AND regenerate together -> 400 (exactly one)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"mrn":"MRN-123456","regenerateMrn":true,"reason":"r"}' "$API/api/icu/adt/patients/$UP2/identity")
          echo "mrn + regenerateMrn together -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # a DUPLICATE MRN is refused — 409 naming the holder (probed with
          # UP1's real generated MRN: deterministic against the durable DB)
          M1=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$UP1" | python3 -c 'import json,sys; print(json.load(sys.stdin)["mrn"])')
          out=$(curl -s -w '\n%{http_code}' -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$M1'","reason":"dup probe"}' "$API/api/icu/adt/patients/$UP2/identity")
          rc=$(echo "$out" | tail -1); echo "duplicate MRN -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | UP1="$UP1" python3 -c 'import json,sys,os; e=json.load(sys.stdin)["error"]; assert os.environ["UP1"] in e and "unique" in e, e; print("precise 409:", e)'
          # REGENERATE — Aurora assigns a fresh canonical number; audited
          # with the PREVIOUS value preserved in the previous→new diff
          M2OLD=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$UP2" | python3 -c 'import json,sys; print(json.load(sys.stdin)["mrn"])')
          curl -sf -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"regenerateMrn":true,"reason":"the recorded value was never an MRN — regenerated into the canonical format"}' \
            "$API/api/icu/adt/patients/$UP2/identity" -o /tmp/mrncorr.json
          M2OLD="$M2OLD" python3 -c '
          import json,os,re; d=json.load(open("/tmp/mrncorr.json")); old=os.environ["M2OLD"]
          assert re.fullmatch(r"MRN-\d{6}", d["mrn"]) and d["mrn"] != old, d["mrn"]
          ev=d["identity"]; assert len(ev)==1, ev
          assert ev[0]["role"]=="Receptionist" and f"mrn: {old} " in ev[0]["detail"] and d["mrn"] in ev[0]["detail"], ev
          print("MRN regenerated + audited:", ev[0]["detail"])'
          # TYPED canonical correction — back to the just-freed old value
          # (deterministic: it was UP2's own MRN a moment ago, nobody
          # else can hold it); history stays APPEND-ONLY
          curl -sf -X PUT -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$M2OLD'","reason":"typed canonical correction probe"}' \
            "$API/api/icu/adt/patients/$UP2/identity" -o /tmp/mrncorr2.json
          M2OLD="$M2OLD" python3 -c '
          import json,os; d=json.load(open("/tmp/mrncorr2.json"))
          assert d["mrn"]==os.environ["M2OLD"], d["mrn"]
          assert len(d["identity"])==2, d["identity"]
          print("typed MRN correction recorded; history append-only:", len(d["identity"]), "events")'
          # hand the corrected patient + the admin token to the MATCH step
          { echo "UP1=$UP1"; echo "ADM=$ADM"; } >> "$GITHUB_ENV"

      - name: State conflicts — occupied bed / duplicate open encounter → 409 naming the conflict (four-code rule)
        run: |
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Second","nameSecond":"Second","nameFamily":"Second","age":30,"sex":"M","allergies":"None","diagnosis":"x","attending":"a","bedId":"'$B1'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); [ "$rc" = "409" ] || { echo "occupied bed must be 409, got $rc"; exit 1; }
          echo "$out" | head -1 | python3 -c "import json,sys; e=json.load(sys.stdin)['error']; assert 'already occupied by $PID' in e, e; print('occupied bed 409:', e)"
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","diagnosis":"x","attending":"a","bedId":"'$B2'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); [ "$rc" = "409" ] || { echo "duplicate admission must be 409, got $rc"; exit 1; }
          echo "$out" | head -1 | python3 -c "import json,sys; e=json.load(sys.stdin)['error']; assert 'already has an open encounter' in e, e; print('duplicate admission 409:', e)"

      - name: PATIENT MATCH — three tiers honestly graded (A confirmed / B verify / C unknowns excluded); ID masked to last 4; DECEASED derived + readmit 409 (match+overview design)
        run: |
          M="$API/api/icu/adt/patients/match"
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"mrn":"MRN-000000"}' "$M")
          echo "unauthenticated match -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{}' "$M")
          echo "nothing to match on -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # Tier A by NATIONAL ID (the office Administrator can run the
          # check — the card is identity-only, census-class data);
          # the FULL ID never rides the response — LAST 4 ONLY
          curl -sf -X POST -H "Authorization: Bearer $ADM" -H 'Content-Type: application/json' \
            -d '{"nationalId":"NID-'$GITHUB_RUN_ID'"}' "$M" -o /tmp/match1.json
          UP1="$UP1" NID="NID-$GITHUB_RUN_ID" python3 -c '
          import json,os; d=json.load(open("/tmp/match1.json")); nid=os.environ["NID"]
          assert d["tier"]=="confirmed" and len(d["matches"])==1, d
          m=d["matches"][0]
          assert m["patientId"]==os.environ["UP1"], m
          assert m["nationalIdLast4"]==nid[-4:], m
          assert m["status"]=="discharged" and m.get("currentBedId") is None, m
          assert nid not in open("/tmp/match1.json").read(), "FULL ID LEAKED"
          print("Tier A (nationalId) CONFIRMED, masked to", m["nationalIdLast4"])'
          # Tier A by MRN on the ADMITTED run patient — the admitted
          # guard fields (status + current bed) the dialog renders
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$GENMRN'"}' "$M" -o /tmp/match2.json
          PID="$PID" B1="$B1" python3 -c '
          import json,os; d=json.load(open("/tmp/match2.json")); m=d["matches"][0]
          assert d["tier"]=="confirmed" and m["patientId"]==os.environ["PID"], d
          assert m["status"]=="admitted" and m["currentBedId"]==os.environ["B1"], m
          print("Tier A (mrn) CONFIRMED — status admitted, bed", m["currentBedId"])'
          # Tier B: exact three required parts + exact DOB -> PROBABLE
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Karim","nameSecond":"Adnan","nameFamily":"Al-Tamimi","dateOfBirth":"1979-05-14"}' "$M" -o /tmp/match3.json
          UP1="$UP1" python3 -c '
          import json,os; d=json.load(open("/tmp/match3.json"))
          assert d["tier"]=="probable" and any(m["patientId"]==os.environ["UP1"] for m in d["matches"]), d
          print("Tier B name+DOB -> PROBABLE (a human verifies; never auto)")'
          # Tier C: unknown patients NEVER match — UP2 (Unknown, age-only,
          # no stored DOB) is invisible to Tier B by construction
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Unknown","nameSecond":"Unknown","nameFamily":"Unknown","dateOfBirth":"1980-01-01"}' "$M" -o /tmp/match4.json
          python3 -c '
          import json; d=json.load(open("/tmp/match4.json"))
          assert d["matches"]==[], d
          print("Tier C: unknown patients excluded — no name-text matching, no flag, no special mode")'
          # DECEASED (#96 disposition died): the card derives it, and the
          # SERVER refuses the readmit — a UI guard is not the only guard
          UB=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" \
            | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free beds"; print(f[0])')
          resp=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"Match","nameSecond":"Deceased","nameFamily":"Probe","nationalId":"DNID-'$GITHUB_RUN_ID'","dateOfBirth":"1949-01-01","sex":"M","allergies":"None documented","diagnosis":"match e2e deceased probe","attending":"Dr. E2E","bedId":"'$UB'"}' \
            "$API/api/icu/adt/admissions")
          DP=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["patient"]["patientId"])')
          DE=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          # EXPORT BEFORE ASSERTING (leak prevention — the 2026-07-10
          # audit's rule): any failure between here and the discharge
          # must still hand DE to the always() cleanup
          echo "EID3=$DE" >> "$GITHUB_ENV"
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"disposition":"died"}' "$API/api/icu/adt/encounters/$DE/discharge" > /dev/null
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nationalId":"DNID-'$GITHUB_RUN_ID'"}' "$M" -o /tmp/match5.json
          python3 -c '
          import json; m=json.load(open("/tmp/match5.json"))["matches"][0]
          assert m["status"]=="deceased", m
          print("deceased derived from disposition died:", m["patientId"])'
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$DP'","diagnosis":"x","attending":"a","bedId":"'$UB'"}' "$API/api/icu/adt/admissions")
          rc=$(echo "$out" | tail -1); echo "readmit a deceased patient -> HTTP $rc"
          if [ "$rc" = "200" ]; then
            # the exact regression this probes: the guard let a deceased
            # patient re-admit — CAPTURE the leaked encounter for the
            # always() cleanup BEFORE failing (no bed may leak on the
            # durable DB, least of all when the guard breaks)
            LEAK=$(echo "$out" | head -1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
            echo "EID4=$LEAK" >> "$GITHUB_ENV"
            echo "DECEASED GUARD REGRESSED — created $LEAK (handed to cleanup)"; exit 1
          fi
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "deceased" in e and "audited record" in e, e; print("precise 409:", e)'
          # the match NEVER creates — encounter count unchanged across all probes
          N1=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')
          curl -s -o /dev/null -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"mrn":"'$GENMRN'"}' "$M"
          N2=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')
          [ "$N1" = "$N2" ] || { echo "MATCH MUTATED STATE: $N1 -> $N2"; exit 1; }
          echo "match creates nothing — no auto-merge, no side effects"

      - name: Transfer — DOCTOR → 403; NURSE → 200 (bed moves on Bed Overview); bad targets → 400
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"bedId":"'$B2'"}' "$API/api/icu/adt/encounters/$EID/transfer")
          echo "doctor transfer -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"bedId":"'$B2'"}' "$API/api/icu/adt/encounters/$EID/transfer" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['bedId']=='$B2', d; print('transferred to', d['bedId'])"
          curl -sf -H "Authorization: Bearer $NUR" "$API/api/icu/patients" \
            | python3 -c "import json,sys; r=[x for x in json.load(sys.stdin) if x['patientId']=='$PID'][0]; assert r['bedId']=='$B2', r; print('roster follows the transfer:', r['bedId'])"
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"bedId":"B-99"}' "$API/api/icu/adt/encounters/$EID/transfer")
          rc=$(echo "$out" | tail -1); [ "$rc" = "400" ] || { echo "nonexistent bed stays validation 400, got $rc"; exit 1; }
          echo "$out" | head -1 | python3 -c "import json,sys; e=json.load(sys.stdin)['error']; assert 'does not match any bed' in e, e; print('nonexistent bed 400:', e)"
          occ=$(python3 -c 'import json; print([b["bedId"] for b in json.load(open("/tmp/beds.json")) if b.get("patientId")][0])')
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"bedId":"'$occ'"}' "$API/api/icu/adt/encounters/$EID/transfer")
          rc=$(echo "$out" | tail -1); [ "$rc" = "409" ] || { echo "occupied target must be 409, got $rc"; exit 1; }
          echo "$out" | head -1 | python3 -c "import json,sys; e=json.load(sys.stdin)['error']; assert 'already occupied' in e, e; print('occupied target 409:', e)"
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"bedId":"'$B1'"}' "$API/api/icu/adt/encounters/ENC-0000/transfer")
          echo "absent encounter transfer -> HTTP $rc"; [ "$rc" = "404" ] || exit 1

      - name: Discharge — NURSE → 403; DOCTOR → 200; bed freed; re-discharge → 400; roster drops the patient
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/adt/encounters/$EID/discharge")
          echo "nurse discharge -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["status"]=="discharged" and d["dischargedBy"]=="Dr. Sara Rahman", d; print("discharged by", d["dischargedBy"], "at", d["dischargedAt"])'
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge")
          rc=$(echo "$out" | tail -1); echo "re-discharge -> HTTP $rc (state conflict)"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already discharged" in e and "nothing to discharge" in e, e'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/ENC-0000/discharge")
          echo "absent encounter discharge -> HTTP $rc"; [ "$rc" = "404" ] || exit 1
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/patients" \
            | python3 -c "import json,sys; assert not [x for x in json.load(sys.stdin) if x['patientId']=='$PID']; print('roster no longer lists $PID')"
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" \
            | python3 -c "import json,sys; b=[x for x in json.load(sys.stdin) if x['bedId']=='$B2'][0]; assert not b.get('patientId'), b; print('$B2 freed')"

      - name: IDENTITY SURVIVES DISCHARGE — 200 with the SAME fields (the recorded gap, closed live)
        run: |
          # THE CRUX of the identity-read PR: the roster just dropped this
          # patient (previous step) — the identity read must still resolve
          # them with identity IDENTICAL to the pre-discharge capture.
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$PID" -o /tmp/idread2.json
          python3 -c '
          import json
          a = json.load(open("/tmp/idread.json")); b = json.load(open("/tmp/idread2.json"))
          assert a == b, (a, b)
          print("discharged patient resolves 200 — identity byte-identical to pre-discharge")'

      - name: DOB admission — dateOfBirth stored, age COMPUTED at read (birthday-aware)
        run: |
          # Admit a SECOND run patient on the bed the transfer freed ($B1),
          # capturing dateOfBirth = (today - 30y + 40d): the birthday is
          # ~40 days ahead, so on most days the birthday-aware age (29)
          # differs from the naive year-difference (30) and the assert
          # discriminates a naive/stored implementation. Expected age is
          # RE-DERIVED AT ASSERT TIME with a fresh clock (no UTC-midnight
          # race against the server); in the ~40 days where +40d crosses
          # the year boundary the naive value coincides — the assert stays
          # CORRECT then, just non-discriminating (logged). Feb-29-safe:
          # year replacement clamps to Feb 28. (Both per the
          # adversarial-review findings on this step's first draft.)
          vals=$(python3 -c '
          import datetime
          t = datetime.date.today()
          try: base = t.replace(year=t.year-30)
          except ValueError: base = t.replace(year=t.year-30, day=28)
          print((base + datetime.timedelta(days=40)).isoformat())')
          read DOBSTR <<<"$vals"
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"E2E","nameSecond":"DOB","nameFamily":"Patient","dateOfBirth":"'$DOBSTR'","sex":"M","allergies":"None documented","diagnosis":"identity-read E2E","attending":"Dr. E2E","bedId":"'$B1'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/admdob.json
          # EXPORT BEFORE ASSERTING (leak prevention — see the first
          # admission step): the encounter exists the moment the curl
          # returns; cleanup must know EID2 even if an assert fails next.
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/admdob.json")); print(d["patient"]["patientId"], d["encounter"]["encounterId"])')
          read PID2 EID2 <<<"$vals"
          echo "EID2=$EID2" >> "$GITHUB_ENV"
          DOBSTR="$DOBSTR" python3 -c '
          import datetime, json, os
          dob = datetime.date.fromisoformat(os.environ["DOBSTR"])
          t = datetime.date.today()
          want = t.year - dob.year - ((t.month, t.day) < (dob.month, dob.day))
          naive = t.year - dob.year
          p = json.load(open("/tmp/admdob.json"))["patient"]
          assert p["dateOfBirth"] == os.environ["DOBSTR"], p
          assert p["age"] == want, (p, want)
          assert p["ageSource"] == "dateOfBirth", p
          served = p["age"]
          print(f"age {served} computed at read"
                + (f" — DISCRIMINATES from the naive year-difference {naive}" if naive != want
                   else " (year-boundary window: naive coincides today; assert still correct)"))'
          echo "admitted $PID2 ($EID2): dateOfBirth $DOBSTR, ageSource dateOfBirth"
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/patients/$PID2" \
            | DOBSTR="$DOBSTR" python3 -c '
          import datetime, json, os, sys
          dob = datetime.date.fromisoformat(os.environ["DOBSTR"])
          t = datetime.date.today()
          want = t.year - dob.year - ((t.month, t.day) < (dob.month, dob.day))
          i = json.load(sys.stdin)
          assert i["age"] == want and i["ageSource"] == "dateOfBirth", (i, want)
          print("identity read serves the computed age too")'
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID2/discharge" >/dev/null
          echo "second encounter discharged (cleanup re-asserts)"

      - name: Durable record — THIS run's closed encounter is queryable (cross-run accumulation = live durability)
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?patientId=$PID&status=discharged" \
            | python3 -c "
          import json,sys; d=json.load(sys.stdin)
          assert d and d[0]['encounterId']=='$EID', d
          ev=[e['action'] for e in d[0]['events']]
          assert ev==['admitted','transferred','discharged'], ev
          print('closed encounter durable with full event history:', ' → '.join(ev))"
          total=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?status=discharged" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')
          echo "discharged encounters on the durable DB (accumulates across runs): $total"

      - name: Failure-path cleanup — release THIS run's encounter (runs on failure/cancel too)
        if: always()
        run: |
          # A mid-run failure used to leak an OPEN encounter occupying a bed
          # forever (2026-07-10 audit). This step runs on success, failure
          # AND cancellation; on the success path the encounter is already
          # discharged and the 400 branch below confirms it.
          if [ -z "${DOC:-}" ]; then
            echo "no token — nothing was created by this run"; exit 0
          fi
          for enc in "${EID:-}" "${EID2:-}" "${EID3:-}" "${EID4:-}"; do
            [ -n "$enc" ] || continue
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$enc/discharge")
            rc=$(echo "$out" | tail -1)
            case "$rc" in
              200) echo "failure-path cleanup released $enc (bed freed)";;
              409) echo "$out" | head -1 | grep -q "already discharged" || { echo "unexpected 409: $out"; exit 1; }
                   echo "$enc already discharged (normal path) — nothing leaked";;
              *)   echo "CLEANUP FAILED: could not release $enc (HTTP $rc) — a bed is leaked, manual action required"; exit 1;;
            esac
          done
          [ -n "${EID:-}${EID2:-}${EID3:-}${EID4:-}" ] || echo "no encounter was created by this run — nothing to release"
