# TEMPORARY OPS PROBE (read-only) — polls /healthz build for ~14 minutes
# and prints every change, to observe whether Render redeploys after a
# render.yaml-only merge. No mutation of any kind.
name: Deployed API E2E
on: workflow_dispatch
concurrency:
  group: deployed-e2e
  cancel-in-progress: false
env:
  API: https://icu-cp49.onrender.com
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Poll /healthz build (observation only)
        run: |
          prev=""
          for i in $(seq 1 56); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            [ "$build" != "$prev" ] && echo "$(date -u +%H:%M:%S) build=$build"
            prev="$build"
            sleep 15
          done
          echo "observation window closed; final build=$prev"
