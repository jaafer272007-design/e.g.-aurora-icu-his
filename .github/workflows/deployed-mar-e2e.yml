# Deployed MAR E2E — verifies the LIVE Render service (Stage 10 Phase 3,
# MAR): authenticated reads return the seeded doses, unauthenticated is
# 401, RBAC polarity holds (doctor 403 on administer, nurse 200), malformed
# payloads are 400 (never a silent no-op), and held/refused require a
# reason. Dispatch manually after merging /server changes to main.
#
# IDEMPOTENT BY DESIGN: read assertions check seeded doses as a SUBSET
# (never exact counts), and every administration action targets a
# scheduled dose on an order THIS RUN creates+signs — so the workflow can
# be re-dispatched any number of times against the durable DB, even
# after other clients have documented the seeded doses.
name: Deployed MAR E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Admit THIS RUN's patient (safety enforcement made the shared P-1001 untenable — accumulated actives trip the duplicate-therapy check; this also resolves the recorded P-1001-discharge fragility)
        run: |
          FREE=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" \
            | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free beds"; print(f[0])')
          resp=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"mrn":"MRN-MARE2E-'$GITHUB_RUN_ID'","name":"MAR E2E Patient","age":58,"sex":"F","allergies":"None known","bedId":"'$FREE'","diagnosis":"MAR E2E","attending":"Dr. Sara Rahman"}' \
            "$API/api/icu/adt/admissions")
          pid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["patient"]["patientId"])')
          eid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          { echo "PID=$pid"; echo "EID=$eid"; } >> "$GITHUB_ENV"
          echo "admitted $pid ($eid) at $FREE"

      - name: Unauthenticated MAR read → 401
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/mar")
          echo "GET /mar (no token) -> HTTP $code"; [ "$code" = "401" ] || exit 1

      - name: Both roles can READ the MAR; seeded doses present (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $NUR" -H "Origin: $PAGES_ORIGIN" "$API/api/icu/mar" -o /tmp/mar.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/mar.json"))
          ids={r["adminId"] for r in d}
          seeded={"ADM-401","ADM-402","ADM-403","ADM-404","ADM-405"}
          missing=seeded-ids
          assert not missing, f"seeded MAR doses missing: {missing}"
          print(f"MAR rows: {len(d)} (seeded doses present; extras from prior writes expected)")'
          code=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/mar")
          echo "doctor MAR read -> HTTP $code"; [ "$code" = "200" ] || exit 1

      - name: Seed a signed med order for THIS RUN (own scheduled doses)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Medication","priority":"Routine","medication":{"drugId":"vancomycin","drug":"Vancomycin","dose":"1 g","route":"IV over 60 min","frequency":"q12h","duration":"5 days","prn":false}}],"sign":true}' \
            "$API/api/icu/orders" > /tmp/o.json
          # standalone assignment so a failing assert FAILS THIS STEP —
          # `read VAR <<<"$(…)"` swallowed it (2026-07-10 audit finding)
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/o.json"))[0]; a=[x["adminId"] for x in d["administrations"]]; assert len(a)>=2, d; print(d["orderId"], a[0], a[1])')
          read OID A1 A2 <<<"$vals"
          echo "created $OID scheduled doses $A1 $A2"
          { echo "OID=$OID"; echo "A1=$A1"; echo "A2=$A2"; } >> "$GITHUB_ENV"

      - name: RBAC polarity — doctor 403 on administer, nurse 200 (actor from token)
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1")
          echo "doctor administer -> HTTP $code"; [ "$code" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); a=[x for x in d["administrations"] if x["status"]=="given" and x["documentedBy"]][0]; assert a["documentedBy"]=="RN Maya Chen", a; print("nurse given by:", a["documentedBy"])'
          # re-document the same dose → 409 STATE CONFLICT (four-code rule —
          # supersedes the original 404: the dose EXISTS, already documented;
          # a racing second nurse must see "already given by X", not "not found")
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1")
          code=$(echo "$out" | tail -1); echo "re-document -> HTTP $code"; [ "$code" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already documented as given" in e and "RN Maya Chen" in e, e; print("precise 409:", e)'
          # absent ids stay 404 — the other branch of the same rule
          for path in "$API/api/icu/mar/ORD-0000/administrations/$A1" "$API/api/icu/mar/$OID/administrations/ADM-0000"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"action":"given"}' "$path")
            echo "absent id -> HTTP $code"; [ "$code" = "404" ] || exit 1
          done

      - name: Held requires a reason (validation live); with reason → 200 + persisted
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"held"}' "$API/api/icu/mar/$OID/administrations/$A2")
          echo "held without reason -> HTTP $code"; [ "$code" = "400" ] || exit 1
          for body in '{}' '{"action":"maybe"}' '{"action":"given","extra":1}'; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/mar/$OID/administrations/$A2")
            echo "malformed '$body' -> HTTP $code"; [ "$code" = "400" ] || exit 1
          done
          curl -sf -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"held","reason":"SBP 82 — holding per parameters"}' "$API/api/icu/mar/$OID/administrations/$A2" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); a=[x for x in d["administrations"] if x["status"]=="held"][0]; assert a["reason"]=="SBP 82 — holding per parameters" and a["documentedBy"]=="RN Maya Chen", a; print("held with reason:", a["reason"])'

      - name: Cleanup — discharge the run encounter (runs on failure/cancel too)
        if: always()
        run: |
          fails=0
          if [ -n "${EID:-}" ]; then
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge")
            echo "discharge $EID -> HTTP $rc"
            { [ "$rc" = "200" ] || [ "$rc" = "409" ]; } || fails=$((fails+1))
            st=$(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?patientId=$PID" \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); print("discharged" if d and all(e["status"]=="discharged" for e in d) else "<live>")')
            echo "encounters final: $st"; [ "$st" = "discharged" ] || fails=$((fails+1))
          fi
          [ "$fails" = "0" ] || { echo "cleanup left live state behind"; exit 1; }
          echo "cleanup complete"
