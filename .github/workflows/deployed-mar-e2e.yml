# Deployed MAR E2E — verifies the LIVE Render service (Stage 10 Phase 3,
# MAR): authenticated reads return the seeded doses, unauthenticated is
# 401, RBAC polarity holds (doctor 403 on administer, nurse 200), malformed
# payloads are 400 (never a silent no-op), and held/refused require a
# reason. Dispatch manually after merging /server changes to main.
#
# IDEMPOTENT BY DESIGN: read assertions check seeded doses as a SUBSET
# (never exact counts), and every administration action targets a
# scheduled dose on an order THIS RUN creates+signs — so the workflow can
# be re-dispatched any number of times against the durable DB, even
# after other clients have documented the seeded doses.
name: Deployed MAR E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up + require THIS COMMIT's build to be live (no stale deployments)
        run: |
          # /healthz serves the deployed commit in `build` (RENDER_GIT_COMMIT).
          # The suite REFUSES to run against any other build, so a green run
          # is attributable to exactly the commit it was dispatched on — a
          # suite can never again test a stale deployment and report green
          # (the 2026-07-10 CI-evidence audit's biggest finding). 60x10s also
          # covers the Render cold start + a full rebuild after a merge.
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: live build=$build · dispatched commit=$GITHUB_SHA"
            [ "$build" = "$GITHUB_SHA" ] && exit 0
            sleep 10
          done
          echo "STALE DEPLOYMENT: /healthz build '$build' never matched the dispatched commit '$GITHUB_SHA' — refusing to test an old build" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Unauthenticated MAR read → 401
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/mar")
          echo "GET /mar (no token) -> HTTP $code"; [ "$code" = "401" ] || exit 1

      - name: Both roles can READ the MAR; seeded doses present (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $NUR" -H "Origin: $PAGES_ORIGIN" "$API/api/icu/mar" -o /tmp/mar.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/mar.json"))
          ids={r["adminId"] for r in d}
          seeded={"ADM-401","ADM-402","ADM-403","ADM-404","ADM-405"}
          missing=seeded-ids
          assert not missing, f"seeded MAR doses missing: {missing}"
          print(f"MAR rows: {len(d)} (seeded doses present; extras from prior writes expected)")'
          code=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $DOC" "$API/api/icu/mar")
          echo "doctor MAR read -> HTTP $code"; [ "$code" = "200" ] || exit 1

      - name: Seed a signed med order for THIS RUN (own scheduled doses)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"P-1001","category":"Medication","priority":"Routine","medication":{"drugId":"vancomycin","drug":"Vancomycin","dose":"1 g","route":"IV over 60 min","frequency":"q12h","duration":"5 days","prn":false}}],"sign":true}' \
            "$API/api/icu/orders" > /tmp/o.json
          # standalone assignment so a failing assert FAILS THIS STEP —
          # `read VAR <<<"$(…)"` swallowed it (2026-07-10 audit finding)
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/o.json"))[0]; a=[x["adminId"] for x in d["administrations"]]; assert len(a)>=2, d; print(d["orderId"], a[0], a[1])')
          read OID A1 A2 <<<"$vals"
          echo "created $OID scheduled doses $A1 $A2"
          { echo "OID=$OID"; echo "A1=$A1"; echo "A2=$A2"; } >> "$GITHUB_ENV"

      - name: RBAC polarity — doctor 403 on administer, nurse 200 (actor from token)
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1")
          echo "doctor administer -> HTTP $code"; [ "$code" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); a=[x for x in d["administrations"] if x["status"]=="given" and x["documentedBy"]][0]; assert a["documentedBy"]=="RN Maya Chen", a; print("nurse given by:", a["documentedBy"])'
          # re-document the same dose → 404 (no longer scheduled)
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$A1")
          echo "re-document -> HTTP $code"; [ "$code" = "404" ] || exit 1

      - name: Held requires a reason (validation live); with reason → 200 + persisted
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"held"}' "$API/api/icu/mar/$OID/administrations/$A2")
          echo "held without reason -> HTTP $code"; [ "$code" = "400" ] || exit 1
          for body in '{}' '{"action":"maybe"}' '{"action":"given","extra":1}'; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/mar/$OID/administrations/$A2")
            echo "malformed '$body' -> HTTP $code"; [ "$code" = "400" ] || exit 1
          done
          curl -sf -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"held","reason":"SBP 82 — holding per parameters"}' "$API/api/icu/mar/$OID/administrations/$A2" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); a=[x for x in d["administrations"] if x["status"]=="held"][0]; assert a["reason"]=="SBP 82 — holding per parameters" and a["documentedBy"]=="RN Maya Chen", a; print("held with reason:", a["reason"])'
