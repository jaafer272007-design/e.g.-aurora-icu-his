name: Deploy to GitHub Pages

# Deploys the live preview from whichever branch is being worked on:
# any push to a claude/* branch that has an open PR against main redeploys
# the site (last push wins). workflow_dispatch always deploys the chosen ref.
on:
  push:
    branches: ['claude/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.pr.outputs.deploy }}
    steps:
      - name: Only deploy branches with an open PR against main
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          n=$(gh api "repos/${{ github.repository }}/pulls?state=open&base=main&head=${{ github.repository_owner }}:${{ github.ref_name }}" --jq 'length')
          echo "open PRs against main for ${{ github.ref_name }}: $n"
          if [ "$n" -gt 0 ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check
    if: needs.check.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # project Pages are served from /<repo>/, so the bundle needs that base path.
      # VITE_API_BASE_URL points the roster adapter at the Stage 10 API (repo
      # variable API_BASE_URL — the Render service URL); empty = mock fallback.
      - run: npm run build -- --base=/e.g.-aurora-icu-his/
        env:
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
      # SPA fallback: Pages serves 404.html for unknown paths, letting the router take over
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
