name: Deploy to GitHub Pages

# Deploys the live preview from whichever branch is being worked on:
# any push to a claude/* branch that has an open PR against main redeploys
# the site (last push wins). workflow_dispatch always deploys the chosen ref.
on:
  push:
    branches: ['claude/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.pr.outputs.deploy }}
    steps:
      - name: Only deploy branches with an open PR against main
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          n=$(gh api "repos/${{ github.repository }}/pulls?state=open&base=main&head=${{ github.repository_owner }}:${{ github.ref_name }}" --jq 'length')
          echo "open PRs against main for ${{ github.ref_name }}: $n"
          if [ "$n" -gt 0 ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check
    if: needs.check.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # project Pages are served from /<repo>/, so the bundle needs that base path.
      # VITE_APP_ENV is the bundle's compiled-in environment identity (step 3):
      # it keeps the mock fallback compiled IN for staging, drives the STAGING
      # banner, and arms the runtime environment cross-check against the API's
      # /healthz. [Appliance Phase 1: VITE_API_BASE_URL is RETIRED — the API
      # base is no longer baked into the bundle; see the runtime-config step
      # below.]
      - run: npm run build -- --base=/e.g.-aurora-icu-his/
        env:
          VITE_APP_ENV: staging
      # RUNTIME API CONFIGURATION (appliance Phase 1): Pages serves the bundle
      # from a DIFFERENT origin than the API, so this deploy overwrites the
      # bundle's shipped same-origin default with the staging API's absolute
      # URL — deployment configuration, not a rebuild. §6.4 still holds: the
      # staging API URL lives IN THIS FILE — versioned, reviewed, and inside
      # the print suite's Pages-gate comparison set; no dashboard-resident
      # routing config. A bundle whose runtime-config.js is missing REFUSES
      # to start (fail-loud, never a silent wrong origin).
      - run: |
          cat > dist/runtime-config.js <<'EOF'
          window.AURORA_RUNTIME_CONFIG = { apiBaseUrl: 'https://icu-cp49.onrender.com' }
          EOF
      # BUILD IDENTIFIER (the /healthz `build` analogue for the FRONTEND):
      # the deployed site serves the commit it was built from at
      # /build.txt, so render-verification suites can gate on Pages
      # freshness by CONTENT (the same v3 gate rule as the server suites).
      # Added after live hands-on verification caught a stale Pages deploy
      # the API suites structurally could not see (2026-07-11).
      # Line 2 is the ENVIRONMENT IDENTITY (environment-separation §11
      # step 1): this Pages site is the STAGING frontend per the merged
      # design. The value is configuration in THIS versioned file (inside
      # the Pages gate's comparison set — no dashboard state), passed as
      # an env var so the future production build carries "production"
      # through the same mechanism (§11 step 3), no code change.
      - run: |
          echo "${GITHUB_SHA}"  > dist/build.txt
          echo "${APP_ENV}"    >> dist/build.txt
        env:
          APP_ENV: staging
      # SPA fallback: Pages serves 404.html for unknown paths, letting the router take over
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
