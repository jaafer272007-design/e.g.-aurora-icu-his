name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/vite-react-scaffold-routing-7t8hps]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # project Pages are served from /<repo>/, so the bundle needs that base path
      - run: npm run build -- --base=/e.g.-aurora-icu-his/
      # SPA fallback: Pages serves 404.html for unknown paths, letting the router take over
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
