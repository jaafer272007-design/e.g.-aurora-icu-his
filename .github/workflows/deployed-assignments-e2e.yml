# Deployed Assignments E2E — verifies the OPT-OUT COVERAGE MODEL live
# (Assignment Simplification — the validator's clinical correction that
# REPLACED #114's opt-in machinery). Coverage: every ACTIVE Nurse-profile
# account covers every open patient BY DEFAULT (no setup); exceptions are
# REMOVALS (restorable, never deleted). Doctors have NO assignment
# concept — /mine for a doctor profile is the whole census. Core
# assertions: assignments.manage stays SeniorDoctor-only (Specialist and
# nurse 403 on remove/restore/staff; everyone with patients.view READS
# coverage); the staff picker lists ONLY nurses; primary/secondary is
# GONE from the wire (an old-shape body fails Disallow binding);
# 🔴 WORKLIST NEVER AUTHORITY, ZERO EXCEPTIONS: a REMOVED nurse still
# documents administration, charts observations AND posts an SBAR
# handoff on the removed patient (the #114 handoff assignment-gate is
# DROPPED — asserted explicitly); 🔴 NEVER ZERO NURSES: removing the
# LAST covering nurse answers 409 (state-aware: the run walks the LIVE
# covering list down to one, so leftover e2e nurse accounts never break
# it); migration honesty live: NO legacy #114 row is still active (the
# boot supersede), history stays readable via /assignments/history;
# discharge drops the patient off every worklist by construction (no
# cascade exists — coverage derives over OPEN encounters only).
#
# IDEMPOTENT AND SELF-SUFFICIENT: every removal targets THIS run's own
# admitted patient and is restored (or closed out by the discharge) in
# cleanup; the med order rides the seeded reference formulary
# (paracetamol — active in the staging seed, no allergy conflict).
name: Deployed Assignments E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson): one shared group across all
# suites means two can never RUN at once.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field — refusing to run." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build' — trigger a MANUAL DEPLOY of the latest commit to clear this gate." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV)" && exit 1

      - name: Login (SeniorDoctor, Specialist, two nurses)
        run: |
          for u in sara.rahman liam.osei maya.chen priya.patel; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "SEN=$t" >> "$GITHUB_ENV";;
              liam.osei)   echo "SPE=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR1=$t" >> "$GITHUB_ENV";;
              priya.patel) echo "NUR2=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Admit THIS RUN's patient (dynamic free bed)
        run: |
          FREE=$(curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/adt/beds" \
            | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free beds"; print(f[0])')
          resp=$(curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d "{\"nameFirst\":\"Coverage\",\"nameSecond\":\"E2E\",\"nameFamily\":\"Patient\",\"age\":51,\"sex\":\"M\",\"allergies\":\"None documented\",\"bedId\":\"$FREE\",\"diagnosis\":\"assignment E2E\",\"attending\":\"Dr. Sara Rahman\"}" \
            "$API/api/icu/adt/admissions")
          pid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["patient"]["patientId"])')
          eid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          { echo "PID=$pid"; echo "EID=$eid"; } >> "$GITHUB_ENV"
          echo "admitted $pid ($eid) at $FREE"

      - name: "DEFAULT COVERAGE — no setup: both nurses cover the fresh patient; doctor /mine = the census; nurse /mine carries the patient; reads for every clinical profile; unknown param 400; unauth 401"
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/assignments")
          echo "unauth coverage -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          for who in SEN SPE NUR1 NUR2; do
            tok=$(eval echo "\$$who")
            rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $tok" "$API/api/icu/assignments")
            echo "$who reads coverage -> HTTP $rc"; [ "$rc" = "200" ] || exit 1
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $SEN" "$API/api/icu/assignments?bogus=1")
          echo "unknown query param -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          curl -sf -D /tmp/h -H "Authorization: Bearer $NUR1" -H "Origin: $PAGES_ORIGIN" \
            "$API/api/icu/assignments?patientId=$PID" -o /tmp/cov.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          PID="$PID" python3 - <<'PY'
          import json, os
          rows = json.load(open("/tmp/cov.json")); assert len(rows) == 1, rows
          c = rows[0]; assert c["patientId"] == os.environ["PID"]
          ids = {n["userId"] for n in c["nurses"]}
          assert {"maya.chen", "priya.patel"} <= ids, ids     # both demo nurses cover BY DEFAULT
          assert c["removals"] == []                            # a fresh patient has no exceptions
          print(f"fresh patient covered by {len(ids)} nurse(s) with ZERO setup — the opt-out default")
          PY
          curl -sf -H "Authorization: Bearer $NUR1" "$API/api/icu/assignments/mine" -o /tmp/mine_n1.json
          PID="$PID" python3 -c 'import json,os; m=json.load(open("/tmp/mine_n1.json")); assert m["kind"]=="nurse" and os.environ["PID"] in m["patientIds"] and os.environ["PID"] not in m["removedPatientIds"]; print("nurse /mine carries the new patient immediately")'
          for who in SEN SPE; do
            tok=$(eval echo "\$$who")
            curl -sf -H "Authorization: Bearer $tok" "$API/api/icu/assignments/mine" -o /tmp/mine_d.json
            PID="$PID" python3 -c 'import json,os; m=json.load(open("/tmp/mine_d.json")); assert m["kind"]=="doctor" and os.environ["PID"] in m["patientIds"] and m["removedPatientIds"]==[]; print("doctor /mine is the CENSUS (no assignment concept)")'
          done

      - name: "RBAC + the retired wire — remove/restore/staff are SeniorDoctor-only; the staff picker lists ONLY nurses; primary/secondary is GONE (old-shape body fails Disallow binding)"
        run: |
          BODY='{"patientId":"'$PID'","userId":"maya.chen"}'
          for who in SPE NUR1; do
            tok=$(eval echo "\$$who")
            for ep in remove restore; do
              rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $tok" -H 'Content-Type: application/json' -d "$BODY" "$API/api/icu/assignments/$ep")
              echo "$who $ep -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
            done
            rc=$(curl -s -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $tok" "$API/api/icu/assignments/staff")
            echo "$who staff -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "$BODY" "$API/api/icu/assignments/remove")
          echo "unauth remove -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments/staff" -o /tmp/staff.json
          python3 - <<'PY'
          import json
          staff = json.load(open("/tmp/staff.json"))
          ids = {s["userId"] for s in staff}
          assert {"maya.chen", "priya.patel"} <= ids, ids
          assert "sara.rahman" not in ids and "liam.osei" not in ids   # doctors have NO assignment concept
          assert all("kinds" not in s for s in staff)                   # the #114 kinds field is gone
          print(f"staff picker: {len(staff)} nurse account(s), zero doctors")
          PY
          # the #114 wire shape is DEAD: role/kind/shift fail Disallow binding
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen","kind":"nurse","role":"primary","shift":"day"}' "$API/api/icu/assignments/remove")
          echo "old opt-in shape (kind/role/shift) -> HTTP $rc (Disallow binding)"; [ "$rc" = "400" ] || exit 1
          # validation: unknown references 400; a DOCTOR account cannot be removed (no nurse coverage exists for it)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"P-9999","userId":"maya.chen"}' "$API/api/icu/assignments/remove")
          echo "unknown patient -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"ghost.user"}' "$API/api/icu/assignments/remove")
          echo "unknown user -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"liam.osei"}' "$API/api/icu/assignments/remove")
          rc=$(echo "$out" | tail -1); echo "removing a DOCTOR -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "no Nurse-profile role" || exit 1

      - name: "REMOVE + the worklist effect — audited removal; the patient leaves ONLY that nurse's /mine (as a removed id); the other nurse and the coverage read keep it; replay 409"
        run: |
          curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen","reason":"1:1 with another patient — assignments E2E"}' \
            "$API/api/icu/assignments/remove" -o /tmp/rmv.json
          PID="$PID" python3 - <<'PY'
          import json, os
          r = json.load(open("/tmp/rmv.json"))
          assert r["removalId"].startswith("RMV-") and r["patientId"] == os.environ["PID"]
          assert r["userId"] == "maya.chen" and r["removedBy"] == "Dr. Sara Rahman"
          assert r["removedByRole"] == "Consultant" and "1:1" in r["reason"] and r.get("restoredAt") is None
          print("removal audited:", r["removalId"], "by", r["removedBy"], "—", r["reason"])
          PY
          curl -sf -H "Authorization: Bearer $NUR1" "$API/api/icu/assignments/mine" -o /tmp/mine_after.json
          PID="$PID" python3 -c 'import json,os; m=json.load(open("/tmp/mine_after.json")); assert os.environ["PID"] not in m["patientIds"] and os.environ["PID"] in m["removedPatientIds"]; print("the patient left the REMOVED nurse'"'"'s focused worklist (and is named as removed)")'
          curl -sf -H "Authorization: Bearer $NUR2" "$API/api/icu/assignments/mine" -o /tmp/mine_n2.json
          PID="$PID" python3 -c 'import json,os; m=json.load(open("/tmp/mine_n2.json")); assert os.environ["PID"] in m["patientIds"]; print("the OTHER nurse still covers (exceptions are per-nurse)")'
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments?patientId=$PID" -o /tmp/cov2.json
          python3 -c '
          import json
          c = json.load(open("/tmp/cov2.json"))[0]
          assert "maya.chen" not in {n["userId"] for n in c["nurses"]}
          active = [r for r in c["removals"] if not r.get("restoredAt")]
          assert len(active) == 1 and active[0]["userId"] == "maya.chen"
          print("coverage read shows the exception inline (audit visible to every clinical viewer)")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen"}' "$API/api/icu/assignments/remove")
          echo "remove replay -> HTTP $rc"; [ "$rc" = "409" ] || exit 1

      - name: "🔴 WORKLIST, NEVER AUTHORITY — ZERO EXCEPTIONS: the REMOVED nurse documents administration, charts observations AND posts an SBAR handoff on the removed patient (the #114 handoff gate is DROPPED)"
        run: |
          # a signed order so there is a real dose to document
          OID=$(curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Medication","priority":"Routine","medication":{"drugId":"paracetamol","drug":"Paracetamol","dose":"1 g","route":"IV","frequency":"q6h","duration":"3 days","prn":false}}],"sign":true}' \
            "$API/api/icu/orders" | python3 -c 'import json,sys; print(json.load(sys.stdin)[0]["orderId"])')
          echo "signed order $OID"
          # the dose instance is DERIVED at read — take its adminId from the MAR
          ADMID=$(curl -sf -H "Authorization: Bearer $NUR1" "$API/api/icu/mar" | python3 -c '
          import json,sys
          rows=[r for r in json.load(sys.stdin) if r["orderId"]=="'$OID'" and r["status"]=="scheduled"]
          assert rows, "no scheduled MAR row for the signed order"
          print(rows[0]["adminId"])')
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR1" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$OID/administrations/$ADMID")
          echo "REMOVED nurse documents administration of dose $ADMID -> HTTP $rc"; [ "$rc" = "200" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR1" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","entries":[{"typeCode":"hr","value":96}]}' "$API/api/icu/observations")
          echo "REMOVED nurse charts an observation -> HTTP $rc"; [ "$rc" = "200" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR1" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","s":"Assignments E2E — the removed nurse hands over","b":"","a":"","r":""}' \
            "$API/api/icu/nursing/handoff")
          echo "REMOVED nurse posts an SBAR handoff -> HTTP $rc (the #114 assignment gate is GONE)"; [ "$rc" = "200" ] || exit 1
          echo "authority comes from role and licensure, never a list — asserted on all three write paths"

      - name: "RESTORE — audited both halves; the patient returns to the worklist; restore replay 409"
        run: |
          curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen"}' "$API/api/icu/assignments/restore" -o /tmp/rst.json
          python3 -c '
          import json
          r = json.load(open("/tmp/rst.json"))
          assert r.get("restoredAt") and r.get("restoredBy") == "Dr. Sara Rahman"
          assert r["removedAt"] and r["removedBy"]      # both halves on ONE row — restored, never deleted
          print("restored:", r["removalId"], "—", r["removedAt"], "→", r["restoredAt"])'
          curl -sf -H "Authorization: Bearer $NUR1" "$API/api/icu/assignments/mine" \
            | PID="$PID" python3 -c 'import json,sys,os; m=json.load(sys.stdin); assert os.environ["PID"] in m["patientIds"] and os.environ["PID"] not in m["removedPatientIds"]; print("the patient is back on the worklist")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen"}' "$API/api/icu/assignments/restore")
          echo "restore replay -> HTTP $rc"; [ "$rc" = "409" ] || exit 1

      - name: "🔴 NEVER ZERO NURSES — removing the LAST covering nurse is REFUSED (state-aware walk of the LIVE covering list); everything restored after"
        run: |
          # walk the patient's LIVE covering list down to one (robust
          # against leftover e2e nurse accounts on the durable staging DB)
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments?patientId=$PID" -o /tmp/cov3.json
          NURSES=$(python3 -c 'import json; print(" ".join(n["userId"] for n in json.load(open("/tmp/cov3.json"))[0]["nurses"]))')
          set -- $NURSES
          TOTAL=$#
          echo "live covering nurses: $TOTAL ($NURSES)"
          [ "$TOTAL" -ge 2 ] || { echo "need at least 2 covering nurses for this leg"; exit 1; }
          REMOVED=""
          while [ $# -gt 1 ]; do
            u=$1; shift
            curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
              -d '{"patientId":"'$PID'","userId":"'$u'","reason":"last-nurse guarantee probe"}' \
              "$API/api/icu/assignments/remove" >/dev/null
            REMOVED="$REMOVED $u"
            echo "removed $u ($# still covering)"
          done
          LAST=$1
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"'$LAST'"}' "$API/api/icu/assignments/remove")
          rc=$(echo "$out" | tail -1)
          echo "removing the LAST covering nurse ($LAST) -> HTTP $rc"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "LAST nurse" || { echo "$out"; exit 1; }
          echo "the hard guarantee holds: a patient can never reach zero nurse coverage"
          for u in $REMOVED; do
            curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
              -d '{"patientId":"'$PID'","userId":"'$u'"}' "$API/api/icu/assignments/restore" >/dev/null
            echo "restored $u"
          done
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments?patientId=$PID" \
            | python3 -c "import json,sys; c=json.load(sys.stdin)[0]; assert len(c['nurses']) == $TOTAL; print('coverage back to the full default ($TOTAL nurses)')"

      - name: "MIGRATION HONESTY live — no legacy #114 row is still active (the boot supersede); history stays readable forever"
        run: |
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments/history" -o /tmp/hist.json
          python3 - <<'PY'
          import json
          rows = json.load(open("/tmp/hist.json"))
          active = [a for a in rows if not a.get("endedAt")]
          assert active == [], f"ACTIVE legacy rows survived the supersede: {[a['assignmentId'] for a in active]}"
          superseded = [a for a in rows if a.get("endReason") == "superseded by the opt-out coverage model (assignment simplification)"]
          print(f"legacy #114 history: {len(rows)} row(s) readable, 0 active, {len(superseded)} carrying the supersede reason")
          PY

      - name: "DISCHARGE — the patient leaves every worklist by construction (coverage derives over OPEN encounters; no cascade exists)"
        run: |
          curl -sf -X POST -H "Authorization: Bearer $SEN" "$API/api/icu/adt/encounters/$EID/discharge" >/dev/null
          echo "discharged $EID"
          curl -sf -H "Authorization: Bearer $NUR1" "$API/api/icu/assignments/mine" \
            | PID="$PID" python3 -c 'import json,sys,os; m=json.load(sys.stdin); assert os.environ["PID"] not in m["patientIds"] and os.environ["PID"] not in m["removedPatientIds"]; print("closed encounter: off the nurse worklist")'
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments/mine" \
            | PID="$PID" python3 -c 'import json,sys,os; m=json.load(sys.stdin); assert os.environ["PID"] not in m["patientIds"]; print("closed encounter: off the doctor census")'
          curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/assignments" \
            | PID="$PID" python3 -c 'import json,sys,os; rows=json.load(sys.stdin); assert not any(c["patientId"]==os.environ["PID"] for c in rows); print("closed encounter: no coverage row (open encounters only)")'
          # carving an exception on the CLOSED episode is initiating care -> 409
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","userId":"maya.chen"}' "$API/api/icu/assignments/remove")
          echo "remove on the closed episode -> HTTP $rc"; [ "$rc" = "409" ] || exit 1

      - name: Failure-path cleanup — restore this run's removals and release the encounter (runs on failure/cancel too)
        if: always()
        run: |
          [ -n "${EID:-}" ] || { echo "no encounter was admitted — nothing to clean"; exit 0; }
          # restore any removal this run left active (only possible while
          # the encounter is still open; after our own discharge step the
          # coverage row is gone and there is nothing to restore)
          cov=$(curl -s -H "Authorization: Bearer $SEN" "$API/api/icu/assignments?patientId=$PID")
          for u in $(echo "$cov" | python3 -c 'import json,sys
          try: rows=json.load(sys.stdin)
          except Exception: rows=[]
          print(" ".join(r["userId"] for c in rows for r in c["removals"] if not r.get("restoredAt")))'); do
            curl -sf -X POST -H "Authorization: Bearer $SEN" -H 'Content-Type: application/json' \
              -d '{"patientId":"'$PID'","userId":"'$u'"}' "$API/api/icu/assignments/restore" >/dev/null \
              && echo "cleanup restored $u" || echo "cleanup restore of $u failed (encounter may be closed — acceptable)"
          done
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $SEN" "$API/api/icu/adt/encounters/$EID/discharge")
          echo "cleanup discharge $EID -> HTTP $code (200 = closed now, 409 = already closed by the suite)"
          [ "$code" = "200" ] || [ "$code" = "409" ] || exit 1
          st=$(curl -sf -H "Authorization: Bearer $SEN" "$API/api/icu/adt/encounters?patientId=$PID" \
            | python3 -c 'import json,sys; print(all(e["status"]=="discharged" for e in json.load(sys.stdin)))')
          echo "all run encounters discharged: $st"; [ "$st" = "True" ] || exit 1
