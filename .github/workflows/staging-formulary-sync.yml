# Staging Formulary Sync — adds formulary reference drugs that exist in
# the versioned seed (server/Data/formulary-seed.json) but are ABSENT
# from the staging formulary, via the Pharmacist management path
# (POST /api/icu/formulary — the built Layer-4 endpoint, full audit).
#
# WHY THIS EXISTS: durable environments seed IF EMPTY (env-separation
# §11 step 2), so a drug added to the seed after an environment's first
# boot never reaches that environment through the seed. The recorded
# operational answer is "added once via the Pharmacist formulary path
# (reference data)" — this workflow IS that path, runnable from a
# GitHub runner (staging is not reachable from every operator network).
# First use: the five Structured Infusion Ordering drugs (adrenaline,
# dopamine, dobutamine, phenylephrine, propofol — PR #87).
#
# STRICTLY ADDITIVE — the honest-data discipline for reference data:
#   - a seed drug MISSING from staging is CREATED (audited, actor =
#     the Pharmacist token, like any manual formulary add);
#   - a seed drug PRESENT on staging is NEVER edited, reactivated or
#     deactivated — content drift against the seed is REPORTED in the
#     log only (staging's live history/state is the source of truth
#     for existing rows; correcting drift is a deliberate manual act);
#   - nothing is ever deleted (there is no delete — locked decision).
# Idempotent: a re-run finds nothing missing and passes.
#
# Dispatch manually — SEQUENTIALLY with the deployed suites (shared
# concurrency group below): it writes to the same live formulary the
# suites read, so interleaving is structurally prevented.
name: Staging Formulary Sync
on: workflow_dispatch

# Same group as the deployed E2E suites (the never-dispatch-concurrently
# lesson): this workflow WRITES formulary rows the suites assert against.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # Declared target (environment-separation §11 step 1's per-suite
  # target table — in-file and versioned; deliberately NO production
  # entry to select). The gate below refuses to write anywhere else.
  EXPECTED_ENV: staging

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (supplies the seed file)
        uses: actions/checkout@v4

      - name: ENVIRONMENT GATE — a data-writing workflow may only run against its declared target
        run: |
          # Identical gate to the deployed suites (§11 step 1). Retried:
          # UNREACHABLE healthz (free-tier cold start) and an ABSENT
          # field (mid-deploy older build). NOT retried: a PRESENT-but-
          # different environment — fails immediately, nothing written.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this workflow writes reference data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to write anything." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field — refusing to run." && exit 1

      - name: Pharmacist login (formulary mutation is Pharmacy-only RBAC — the same authority as a manual add)
        run: |
          t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"samir.qassem","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          echo "::add-mask::$t"
          echo "PHA=$t" >> "$GITHUB_ENV"
          echo "samir.qassem: token issued"

      - name: Sync — create seed drugs absent from staging; report (never fix) drift on present ones
        run: |
          curl -sf -H "Authorization: Bearer $PHA" "$API/api/icu/formulary" > /tmp/live.json
          python3 - <<'PY'
          import json, os, subprocess, sys

          seed = json.load(open("server/Data/formulary-seed.json"))
          live = {d["drugId"]: d for d in json.load(open("/tmp/live.json"))}
          api, tok = os.environ["API"], os.environ["PHA"]

          # CreateDrugRequest binds with Disallow — send EXACTLY its fields.
          # The seed's extra 'active' is stripped (all seed rows are active;
          # a create is born active, so nothing is lost).
          FIELDS = ["drugId", "name", "brandNames", "drugClass", "form",
                    "strengths", "doses", "defaultDose", "doseLimits",
                    "routes", "frequencies", "prnCapable",
                    "allergyBlock", "allergyWarn"]

          added, present, drifted, failed = [], [], [], []
          for d in seed:
              did = d["drugId"]
              if did in live:
                  present.append(did)
                  # drift REPORT only — comparable fields, live extras ignored
                  diffs = [f for f in FIELDS
                           if f in d and live[did].get(f) != d.get(f)]
                  if diffs:
                      drifted.append((did, diffs))
                  continue
              body = json.dumps({f: d[f] for f in FIELDS if f in d})
              r = subprocess.run(
                  ["curl", "-s", "-o", "/tmp/resp.json", "-w", "%{http_code}",
                   "-X", "POST", f"{api}/api/icu/formulary",
                   "-H", f"Authorization: Bearer {tok}",
                   "-H", "Content-Type: application/json", "-d", body],
                  capture_output=True, text=True)
              rc = r.stdout.strip()
              if rc == "200":
                  added.append(did)
                  print(f"ADDED   {did} -> HTTP 200")
              else:
                  failed.append(did)
                  print(f"FAILED  {did} -> HTTP {rc}: {open('/tmp/resp.json').read()[:300]}")

          print(f"\nseed drugs: {len(seed)} · already present: {len(present)}"
                f" · added this run: {len(added)} · failed: {len(failed)}")
          for did, diffs in drifted:
              print(f"DRIFT (reported, NOT changed): {did} differs from the seed in {diffs}")
          if failed:
              sys.exit(1)
          PY

      - name: Verify — every seed drug now present and active on staging (any-profile read)
        run: |
          curl -sf -H "Authorization: Bearer $PHA" "$API/api/icu/formulary" > /tmp/after.json
          python3 - <<'PY'
          import json
          seed = json.load(open("server/Data/formulary-seed.json"))
          live = {d["drugId"]: d for d in json.load(open("/tmp/after.json"))}
          missing = [d["drugId"] for d in seed if d["drugId"] not in live]
          assert not missing, f"still missing after sync: {missing}"
          inactive = [d["drugId"] for d in seed if not live[d["drugId"]]["active"]]
          # inactive-but-present is REPORTED, not corrected (deactivation is
          # a deliberate live act this sync must never silently reverse)
          for did in inactive:
              print(f"NOTE: seed drug {did} exists on staging but is DEACTIVATED — left as-is")
          audited = [did for did, d in live.items()
                     if did in {s["drugId"] for s in seed}
                     and any(h["action"] == "added to formulary" for h in d["history"])]
          print(f"all {len(seed)} seed drugs present on staging"
                f" ({len(audited)} carry an 'added to formulary' audit event)")
          PY
