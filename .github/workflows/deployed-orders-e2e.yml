# Deployed Orders E2E — verifies the LIVE Render service (Stage 10
# Phase 3, Orders): authenticated order reads return the seeded data,
# unauthenticated calls are 401, malformed payloads are 400 (never
# silently no-oped or persisted), and EVERY prescriber mutation
# (create/sign/modify/discontinue) enforces RBAC SERVER-SIDE — a nurse
# token is rejected 403 on all four while a doctor token succeeds with
# the actor derived from the token; implement is nurse-only (doctor 403).
#
# IDEMPOTENT AND SELF-SUFFICIENT: every mutation targets an order this
# run creates ON ITS OWN ADMITTED PATIENT (safety enforcement made shared
# demo patients untenable — accumulated active orders trigger the
# duplicate-therapy check — and this also resolves the recorded
# P-1001-discharge fragility for this suite); read assertions check the
# seeded records as a SUBSET. The SAFETY step asserts the server-side
# allergy/interaction/duplicate model live: hard block never overridable,
# warn-level 409 without an overrideJustification, audited override with
# one. Cleanup discharges the run's encounter (the cascade closes its
# orders) and deactivates the run's drug.
name: Deployed Orders E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login (doctor, nurse, pharmacist) + run-unique names
        run: |
          for u in sara.rahman maya.chen samir.qassem; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman)  echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)    echo "NUR=$t" >> "$GITHUB_ENV";;
              samir.qassem) echo "PHA=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done
          { echo "ODRUG=e2e-odrug-${GITHUB_RUN_ID}"; } >> "$GITHUB_ENV"

      - name: Create the run drug + admit the run patient (self-sufficiency)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $PHA" -H 'Content-Type: application/json' \
            -d "{\"drugId\":\"$ODRUG\",\"name\":\"E2E Orders Drug\",\"brandNames\":[],\"drugClass\":\"Test\",\"form\":\"tablet\",\"strengths\":[\"1 mg\"],\"doses\":[\"1 mg\"],\"defaultDose\":\"1 mg\",\"routes\":[\"PO\"],\"frequencies\":[\"daily\"],\"prnCapable\":false,\"allergyBlock\":[],\"allergyWarn\":[]}" \
            "$API/api/icu/formulary" > /dev/null
          echo "run drug $ODRUG created"
          FREE=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" \
            | python3 -c 'import json,sys; f=[b["bedId"] for b in json.load(sys.stdin) if not b.get("patientId")]; assert f, "no free beds"; print(f[0])')
          # allergies "Penicillin" — deliberate: the SAFETY step exercises
          # the allergy block/warn model against this documented allergy
          resp=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"nameFirst\":\"Orders\",\"nameSecond\":\"E2E\",\"nameFamily\":\"Patient\",\"age\":47,\"sex\":\"M\",\"allergies\":\"Penicillin\",\"bedId\":\"$FREE\",\"diagnosis\":\"orders E2E\",\"attending\":\"Dr. Sara Rahman\"}" \
            "$API/api/icu/adt/admissions")
          pid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["patient"]["patientId"])')
          eid=$(echo "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["encounter"]["encounterId"])')
          { echo "PID=$pid"; echo "EID=$eid"; } >> "$GITHUB_ENV"
          echo "admitted $pid ($eid) at $FREE"

      - name: Unauthenticated order reads → 401
        run: |
          for qs in "patientId=P-1001" "status=pending" "implement=true"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/orders?$qs")
            echo "orders?$qs -> HTTP $code"
            [ "$code" = "401" ] || exit 1
          done

      - name: Authenticated reads contain the seeded data (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $DOC" -H "Origin: $PAGES_ORIGIN" \
            "$API/api/icu/orders?patientId=P-1001" -o /tmp/orders.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/orders.json"))
          ids={o["orderId"] for o in d}
          seeded={f"ORD-{n}" for n in range(2001,2012)}
          missing=seeded-ids
          assert not missing, f"seeded orders missing: {missing}"
          first=[o for o in d if o["orderId"]=="ORD-2001"][0]
          assert first["status"] in ("active","discontinued") and first["orderedBy"], first
          print(f"P-1001 orders: {len(d)} (seeded 11 all present; extras from prior writes are expected)")'

      - name: Malformed create payloads → 400, never persisted (validation live)
        run: |
          before=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=P-1001" | python3 -c 'import json,sys;print(len(json.load(sys.stdin)))')
          for body in '{}' '{"orders":[{"patientId":"P-1001"}],"sign":true}' \
            '{"drafts":[{"patientId":"P-9999","category":"Nursing","summary":"x","priority":"Routine"}],"sign":false}'; do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/orders")
            echo "malformed create -> HTTP $code"
            [ "$code" = "400" ] || exit 1
          done
          after=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=P-1001" | python3 -c 'import json,sys;print(len(json.load(sys.stdin)))')
          echo "order count $before -> $after (must be unchanged)"
          [ "$before" = "$after" ] || exit 1

      - name: Unparseable frequency 400; UNKNOWN drugId/testId 400 (formulary/catalogue AUTHORITY — the closed escape hatch)
        run: |
          # frequency legs ride the run drug now — drugId "x" is REJECTED
          # since the authority fix (the old escape-hatch legs are gone)
          for f in "q99999999999h" "q0h" "whenever"; do
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
              -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Medication\",\"priority\":\"Routine\",\"medication\":{\"drugId\":\"$ODRUG\",\"drug\":\"E2E Orders Drug\",\"dose\":\"1 mg\",\"route\":\"PO\",\"frequency\":\"$f\",\"duration\":\"1 day\",\"prn\":false}}],\"sign\":false}" \
              "$API/api/icu/orders")
            echo "frequency '$f' -> $out" | head -2
            [ "$(echo "$out" | tail -1)" = "400" ] || exit 1
          done
          # THE ABSENCE PROBES (the codified coverage lesson, owed by this
          # suite): an order for an id that resolves to NOTHING is 400
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Medication\",\"priority\":\"Routine\",\"medication\":{\"drugId\":\"totally-fake-drug-xyz\",\"drug\":\"Fictional Compound\",\"dose\":\"1 g\",\"route\":\"IV\",\"frequency\":\"daily\",\"duration\":\"1 day\",\"prn\":false}}],\"sign\":true}" \
            "$API/api/icu/orders")
          rc=$(echo "$out" | tail -1); echo "UNKNOWN drugId -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "does not match any formulary drug" in e, e; print("400:", e)'
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Lab\",\"summary\":\"ghost test\",\"testId\":\"no-such-test\",\"priority\":\"Routine\"}],\"sign\":false}" \
            "$API/api/icu/orders")
          rc=$(echo "$out" | tail -1); echo "UNKNOWN testId -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "does not match any catalogue test" in e, e; print("400:", e)'


      - name: NURSE token → 403 on ALL prescriber mutations (server-side RBAC)
        run: |
          check() { echo "$1 -> HTTP $2"; [ "$2" = "403" ] || exit 1; }
          check "create" "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"P-1001","category":"Nursing","summary":"x","priority":"Routine"}],"sign":false}' "$API/api/icu/orders")"
          check "sign" "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/orders/ORD-2001/sign")"
          check "modify" "$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"changes":{"dose":"2 g"},"reason":"x"}' "$API/api/icu/orders/ORD-2001")"
          check "discontinue" "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"reason":"x"}' "$API/api/icu/orders/ORD-2001/discontinue")"

      - name: DOCTOR full lifecycle on THIS RUN's own orders (actor from token)
        run: |
          # create an unsigned med order, then drive it through sign → modify → discontinue
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Medication","priority":"Routine","medication":{"drugId":"vancomycin","drug":"Vancomycin","dose":"1 g","route":"IV over 60 min","frequency":"q12h","duration":"5 days","prn":false}}],"sign":false,"note":"deployed E2E"}' \
            "$API/api/icu/orders" > /tmp/created.json
          OID=$(python3 -c 'import json; d=json.load(open("/tmp/created.json"))[0]; assert d["status"]=="pending" and d["orderedBy"]=="Dr. Sara Rahman", d; print(d["orderId"])')
          echo "created pending $OID"
          echo "OID=$OID" >> "$GITHUB_ENV"   # the four-code step below runs in its OWN shell
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?status=pending" \
            | python3 -c "import json,sys; ids=[o['orderId'] for o in json.load(sys.stdin)]; assert '$OID' in ids, ids; print('pending queue contains $OID')"
          # DERIVED SCHEDULE (MAR safety fix): signing stores NO dose slots —
          # administrations stay absent; the MAR derives instances at read
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/orders/$OID/sign" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); h=d["history"][-1]; assert d["status"]=="active" and h["actor"]=="Dr. Sara Rahman" and h["action"]=="signed" and not d.get("administrations"), d; print("signed:", d["status"], "| no stored schedule (derived at MAR read)")'
          curl -sf -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"changes":{"dose":"500 mg"},"reason":"deployed E2E"}' "$API/api/icu/orders/$OID" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); h=d["history"][-1]; assert h["actor"]=="Dr. Sara Rahman" and "dose: 1 g → 500 mg" in h["detail"], h; print("modified:", h["detail"])'
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"reason":"deployed E2E"}' "$API/api/icu/orders/$OID/discontinue" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["status"]=="discontinued" and d["history"][-1]["actor"]=="Dr. Sara Rahman" and not [a for a in (d.get("administrations") or []) if a["status"]=="scheduled"], d; print("discontinued | no scheduled admins (derived schedule ends with the order)")'

      - name: FOUR-CODE RULE on the same order — replays → 409 naming the state; absent ids → 404; shape → 400
        run: |
          # $OID is now discontinued: every replayed transition is a STATE
          # conflict (was 404 pre-convention — the state was folded into the
          # lookup, making a replayed action look like absence)
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/orders/$OID/sign")
          rc=$(echo "$out" | tail -1); echo "sign discontinued -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "is discontinued" in e and "not awaiting signature" in e, e'
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"reason":"replay"}' "$API/api/icu/orders/$OID/discontinue")
          rc=$(echo "$out" | tail -1); echo "re-discontinue -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already discontinued" in e, e'
          out=$(curl -s -w '\n%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"changes":{"dose":"2 g"},"reason":"replay"}' "$API/api/icu/orders/$OID")
          rc=$(echo "$out" | tail -1); echo "modify discontinued -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "discontinued order cannot be modified" in e, e'
          # implement of a MEDICATION order is SHAPE, not state -> 400
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/orders/$OID/implement")
          rc=$(echo "$out" | tail -1); echo "implement med order -> HTTP $rc (shape)"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "administered via the MAR" in e, e'
          # absent ids stay 404 on every mutation — the other branch.
          # Each probe carries the token AUTHORIZED for that mutation:
          # RBAC runs BEFORE the lookup and 403 is deliberately generic
          # (it must not reveal whether the id exists), so a doctor token
          # probing the nurse-only implement gets 403, never the 404
          # under test (run #16 failed exactly there).
          for m in "DOC POST /api/icu/orders/ORD-0000/sign" "DOC POST /api/icu/orders/ORD-0000/discontinue" "NUR POST /api/icu/orders/ORD-0000/implement"; do
            who="${m%% *}"; rest="${m#* }"; verb="${rest%% *}"; path="${rest#* }"
            if [ "$who" = "NUR" ]; then tok="$NUR"; else tok="$DOC"; fi
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X "$verb" -H "Authorization: Bearer $tok" -H 'Content-Type: application/json' -d '{"reason":"x"}' "$API$path")
            echo "absent $path ($who) -> HTTP $rc"; [ "$rc" = "404" ] || exit 1
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"changes":{"dose":"2 g"},"reason":"x"}' "$API/api/icu/orders/ORD-0000")
          echo "absent modify -> HTTP $rc"; [ "$rc" = "404" ] || exit 1

      - name: Implement is nurse-only, on THIS RUN's own order (doctor 403, nurse 200)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"deployed E2E implementation check","priority":"Routine","requiresImplementation":true}],"sign":true}' \
            "$API/api/icu/orders" > /tmp/impl.json
          IID=$(python3 -c 'import json; print(json.load(open("/tmp/impl.json"))[0]["orderId"])')
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/orders/$IID/implement")
          echo "doctor implement $IID -> HTTP $code"; [ "$code" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/orders/$IID/implement" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["status"]=="completed" and d["history"][-1]["actor"]=="RN Maya Chen", d; print("nurse implement:", d["status"], "| by:", d["history"][-1]["actor"])'
          # replayed implement (now completed) -> 409 naming the state
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/orders/$IID/implement")
          rc=$(echo "$out" | tail -1); echo "re-implement -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already completed" in e, e'
          # a PENDING implementation order is state too: it must be signed first
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"deployed E2E pending-implement probe","priority":"Routine","requiresImplementation":true}],"sign":false}' \
            "$API/api/icu/orders" > /tmp/pend-impl.json
          PIID=$(python3 -c 'import json; print(json.load(open("/tmp/pend-impl.json"))[0]["orderId"])')
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/orders/$PIID/implement")
          rc=$(echo "$out" | tail -1); echo "implement pending -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "must be signed before" in e, e'
          # tidy: discontinue the probe so the run leaves nothing pending
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"reason":"deployed E2E probe cleanup"}' "$API/api/icu/orders/$PIID/discontinue" >/dev/null

      - name: SERVER-SIDE SAFETY — hard block never overridable; warn 409 → audited override; the client can no longer skip it
        run: |
          med(){ echo "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Medication\",\"priority\":\"Routine\",\"medication\":{\"drugId\":\"$1\",\"drug\":\"$2\",\"dose\":\"$3\",\"route\":\"$4\",\"frequency\":\"$5\",\"duration\":\"3 days\",\"prn\":false}}],\"sign\":true${6:+,\"overrideJustification\":\"$6\"}}"; }
          # (a) allergyBlock vs the documented "Penicillin" allergy → HARD 409,
          #     and an override justification does NOT clear it
          for j in "" "clinically essential"; do
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
              -d "$(med piperacillin-tazobactam Piperacillin-Tazobactam "4.5 g" "IV over 30 min" q8h "$j")" "$API/api/icu/orders")
            rc=$(echo "$out" | tail -1); echo "allergy-blocked drug (override='$j') -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
            echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "safety block" in e and "contraindicated (penicillin)" in e.lower() and "cannot be overridden" in e, e'
          done
          # (b) allergyWarn (meropenem: penicillin cross-reactivity) → 409
          #     WITHOUT an override; 200 WITH one, and the override is AUDITED
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "$(med meropenem Meropenem "1 g" "IV over 30 min" q8h)" "$API/api/icu/orders")
          rc=$(echo "$out" | tail -1); echo "warn w/o override -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "safety warning" in e and "cross-reactivity" in e and "requires an acknowledged override" in e, e; print("409:", e)'
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "$(med meropenem Meropenem "1 g" "IV over 30 min" q8h "sepsis — benefit outweighs cross-reactivity risk")" "$API/api/icu/orders" \
            | python3 -c '
          import json,sys
          d=json.load(sys.stdin)[0]
          ev=[e for e in d["history"] if e["action"]=="safety override"]
          assert len(ev)==1 and "cross-reactivity" in ev[0]["detail"] and "justification: sepsis — benefit outweighs cross-reactivity risk" in ev[0]["detail"], d["history"]
          assert ev[0]["actor"]=="Dr. Sara Rahman" and d["status"]=="active"
          print("override AUDITED on", d["orderId"], "|", ev[0]["detail"][:80] + "…")'
          # (c) duplicate therapy (meropenem now active) → warn-level 409
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "$(med meropenem Meropenem "1 g" "IV over 30 min" q8h)" "$API/api/icu/orders")
          echo "duplicate therapy w/o override -> HTTP $rc"; [ "$rc" = "409" ] || exit 1
          # (d) interaction rules: enoxaparin active, then heparin → BLOCK
          #     (duplicate anticoagulation — never overridable); ketorolac → warn
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "$(med enoxaparin Enoxaparin "40 mg" SC daily)" "$API/api/icu/orders" >/dev/null
          for j in "" "please"; do
            out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
              -d "$(med heparin "Heparin (unfractionated)" "5000 U" SC q8h "$j")" "$API/api/icu/orders")
            rc=$(echo "$out" | tail -1); echo "block-severity interaction (override='$j') -> HTTP $rc"; [ "$rc" = "409" ] || { echo "$out"; exit 1; }
            echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "safety block" in e and "Duplicate therapeutic anticoagulation" in e and "cannot be overridden" in e, e'
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "$(med ketorolac Ketorolac "15 mg" IV q6h)" "$API/api/icu/orders")
          echo "warn-severity interaction w/o override -> HTTP $rc"; [ "$rc" = "409" ] || exit 1

      - name: Cleanup — discharge the run encounter + deactivate the run drug (runs on failure/cancel too)
        if: always()
        run: |
          fails=0
          if [ -n "${EID:-}" ]; then
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge")
            echo "discharge $EID -> HTTP $rc"
            { [ "$rc" = "200" ] || [ "$rc" = "409" ]; } || fails=$((fails+1))
          fi
          if [ -n "${ODRUG:-}" ]; then
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $PHA" "$API/api/icu/formulary/$ODRUG/deactivate")
            echo "deactivate $ODRUG -> HTTP $rc"
            { [ "$rc" = "200" ] || [ "$rc" = "409" ] || [ "$rc" = "404" ]; } || fails=$((fails+1))
          fi
          if [ -n "${PID:-}" ]; then
            st=$(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?patientId=$PID" \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); print("discharged" if d and all(e["status"]=="discharged" for e in d) else "<live>")')
            echo "encounters final: $st"; [ "$st" = "discharged" ] || fails=$((fails+1))
          fi
          [ "$fails" = "0" ] || { echo "cleanup left live state behind"; exit 1; }
          echo "cleanup complete — no active run state remains"
