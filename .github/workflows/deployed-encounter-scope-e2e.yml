# Deployed Encounter-Scoping E2E — verifies the LIVE Render service after
# the ORD-113 fix (an order's lifecycle is bounded by its encounter):
# create scopes new orders to the open encounter; discharge auto-
# discontinues the encounter's active/pending orders in the same
# transaction (audited, discharging clinician as actor, scheduled doses
# cancelled); the MAR and working queues derive only from open
# encounters; clinical initiation on a closed episode is 409 Conflict at
# the EncounterGuard chokepoint; readmission surfaces no stale actives;
# and the one-time backfill's neutralization of ORD-113 itself (actor
# System, exact migration reason) is asserted read-only — its continued
# presence across runs is the idempotence evidence. Dispatch manually
# after merging /server changes to main — SEQUENTIALLY with the other
# suites, never concurrently (recorded lesson).
#
# IDEMPOTENT UNDER PERSISTENCE BY DESIGN (codified finite-seeded-resources
# rule): the run admits ITS OWN patient (unique MRN per run id), creates
# the orders it consumes against that patient, and discharges its own
# encounters — the discharge cascade itself guarantees no active order is
# left behind (unlike the MAR/Timeline suites' recorded accumulation
# debt). Nothing seeded is mutated; ORD-113 is asserted READ-ONLY.
#
# LOCAL-ONLY LEGS (documented, not tested here — each has a reason):
# - result acknowledgment on a CLOSED encounter → 200 (the narrow-
#   invariant exemption that stops this fix becoming the opposite
#   patient-safety bug): needs a discharged patient WITH seeded unacked
#   results — discharging a seeded patient live would permanently break
#   the auth suite's roster subset assertion, so this is proven locally
#   on a throwaway DB (discharge seeded patient → acknowledge → 200).
name: Deployed Encounter-Scope E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson): one shared group across all the
# suites means two can never RUN at once. GitHub keeps at most one
# PENDING run per group, so still dispatch one at a time.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done
          echo "MRN=MRN-ESCOPE-${GITHUB_RUN_ID}" >> "$GITHUB_ENV"

      - name: ORD-113 was neutralized by the audited backfill (read-only; re-asserting every run IS the idempotence evidence)
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=P-1017" -o /tmp/p1017.json
          python3 - << 'PY'
          import json
          REASON = "system migration — encounter closed before the encounter-bound invariant existed"
          orders = {o["orderId"]: o for o in json.load(open("/tmp/p1017.json"))}
          o = orders["ORD-113"]
          assert o["status"] == "discontinued", o["status"]
          assert o["statusReason"] == REASON, o["statusReason"]
          assert o["encounterId"] == "ENC-1017", o.get("encounterId")
          disc = [h for h in o["history"] if h["action"] == "discontinued"]
          assert len(disc) == 1, disc          # idempotence: never a duplicate audit event
          assert disc[0]["actor"] == "System", disc[0]
          assert REASON in (disc[0].get("detail") or ""), disc[0]
          print("ORD-113: discontinued by actor System with the migration reason, scoped to ENC-1017, exactly one audit event")
          PY

      - name: Clinical initiation on a patient with NO open encounter → 409 Conflict (chokepoint, not validation)
        run: |
          # P-1017 is discharged: creating an order for them is a RESOURCE-STATE
          # conflict (409), no longer the pre-fix validation 400.
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"P-1017","category":"Nursing","summary":"escope e2e probe","priority":"Routine"}],"sign":false}' \
            "$API/api/icu/orders")
          rc=$(echo "$out" | tail -1); echo "create on discharged P-1017 -> HTTP $rc"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "has no open encounter" in e and "new care cannot be initiated on a closed episode" in e, e; print("precise 409:", e)'

      - name: encounterId is STRICTLY SERVER-DERIVED — supplying it in a mutation payload fails binding (400)
        run: |
          # The scoping value is never accepted from the client: a doctor
          # could otherwise attribute an order to an encounter of their
          # choosing (another patient's, or a closed one). The request DTOs
          # carry JsonUnmappedMemberHandling.Disallow and no EncounterId
          # member, so the field fails binding exactly like any unknown
          # field — this leg is the regression tripwire for that property.
          for body in \
            '{"drafts":[{"patientId":"P-1001","encounterId":"ENC-1007","category":"Nursing","summary":"spoof probe","priority":"Routine"}],"sign":true}' \
            '{"encounterId":"ENC-1007","drafts":[{"patientId":"P-1001","category":"Nursing","summary":"spoof probe","priority":"Routine"}],"sign":true}'; do
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/orders")
            echo "create with client-supplied encounterId -> HTTP $rc"
            [ "$rc" = "400" ] || exit 1
          done
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"reason":"spoof probe","changes":{"encounterId":"ENC-1007","dose":"2 g"}}' "$API/api/icu/orders/ORD-2001")
          echo "modify with encounterId in changes -> HTTP $rc"
          [ "$rc" = "400" ] || exit 1
          echo "encounterId rejected everywhere it could be supplied — scoping is the server's alone"

      - name: Admit THIS RUN's patient (unique MRN, dynamic free bed)
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" -o /tmp/beds.json
          B1=$(python3 -c 'import json; free=[b["bedId"] for b in json.load(open("/tmp/beds.json")) if not b.get("patientId")]; assert free, "no free beds — discharge stale encounters"; print(free[0])')
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$MRN'","name":"E2E Encounter-Scope Patient","age":52,"sex":"M","allergies":"None documented","diagnosis":"encounter-scope E2E","attending":"Dr. E2E","bedId":"'$B1'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/adm.json
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/adm.json")); print(d["patient"]["patientId"], d["encounter"]["encounterId"])')
          read PID EID <<<"$vals"
          echo "admitted $PID on $EID (bed $B1)"
          { echo "PID=$PID"; echo "EID=$EID"; } >> "$GITHUB_ENV"

      - name: Create signed med order + pending order — BOTH scoped to the open encounter
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Medication","priority":"Routine","medication":{"drugId":"vancomycin","drug":"Vancomycin","dose":"1 g","route":"IV over 60 min","frequency":"q12h","duration":"5 days","prn":false}}],"sign":true}' \
            "$API/api/icu/orders" -o /tmp/med.json
          vals=$(EID="$EID" python3 -c '
          import json, os
          d = json.load(open("/tmp/med.json"))[0]
          assert d["encounterId"] == os.environ["EID"], d.get("encounterId")
          assert d["status"] == "active"
          sched = [a["adminId"] for a in d["administrations"] if a["status"] == "scheduled"]
          assert sched, d["administrations"]
          print(d["orderId"], sched[0])')
          read MED ADMID <<<"$vals"
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"encounter-scope pending order","priority":"Routine"}],"sign":false}' \
            "$API/api/icu/orders" -o /tmp/pend.json
          PEND=$(EID="$EID" python3 -c '
          import json, os
          d = json.load(open("/tmp/pend.json"))[0]
          assert d["encounterId"] == os.environ["EID"] and d["status"] == "pending", d
          print(d["orderId"])')
          echo "created $MED (active, dose $ADMID) + $PEND (pending) — both carry encounterId=$EID"
          { echo "MED=$MED"; echo "ADMID=$ADMID"; echo "PEND=$PEND"; } >> "$GITHUB_ENV"

      - name: MAR serves the order's doses while the encounter is open
        run: |
          curl -sf -H "Authorization: Bearer $NUR" "$API/api/icu/mar" \
            | MED="$MED" python3 -c '
          import json, sys, os
          ids = {r["orderId"] for r in json.load(sys.stdin)}
          assert os.environ["MED"] in ids, sorted(ids)
          print("MAR contains the run order while its encounter is open")'

      - name: Discharge → the cascade discontinues BOTH orders in the same transaction (audited, clinician actor, doses cancelled)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["status"]=="discharged", d; print("discharged by", d["dischargedBy"])'
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=$PID" -o /tmp/after.json
          MED="$MED" PEND="$PEND" python3 - << 'PY'
          import json, os
          REASON = "patient discharged — auto-discontinued at discharge"
          d = {o["orderId"]: o for o in json.load(open("/tmp/after.json"))}
          for key in ("MED", "PEND"):
              o = d[os.environ[key]]
              assert o["status"] == "discontinued", (o["orderId"], o["status"])
              assert o["statusReason"] == REASON, o["statusReason"]
              last = o["history"][-1]
              assert last["actor"] == "Dr. Sara Rahman", last   # the DISCHARGING clinician, from the token
              assert last["action"] == "discontinued" and REASON in (last.get("detail") or ""), last
          admins = d[os.environ["MED"]]["administrations"]
          assert all(a["status"] != "scheduled" for a in admins), admins
          print("cascade: active + pending both discontinued, actor = discharging clinician, exact reason, scheduled doses cancelled")
          PY

      - name: sign/modify/implement on the CLOSED encounter → 409 at the guard (live since the four-code fix)
        run: |
          # Before the state-conflict PR these were unreachable live: the
          # lookups folded status, so the cascade-discontinued orders
          # 404'd before the guard could answer. With lookup and state
          # separated, the ENCOUNTER guard now answers first — the deeper
          # cause — proving the guard ordering live.
          for probe in "POST /api/icu/orders/$PEND/sign" "POST /api/icu/orders/$PEND/implement"; do
            verb="${probe%% *}"; path="${probe#* }"
            out=$(curl -s -w '\n%{http_code}' -X "$verb" -H "Authorization: Bearer $DOC" "$API$path")
            rc=$(echo "$out" | tail -1); echo "$path -> HTTP $rc"
            [ "$rc" = "409" ] || [ "$rc" = "403" ] || { echo "$out"; exit 1; }
          done
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/orders/$PEND/sign")
          rc=$(echo "$out" | tail -1); [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "is not open" in e and "signing an order" in e, e; print("sign on closed encounter -> 409 at the GUARD (not a status 409):", e)'
          out=$(curl -s -w '\n%{http_code}' -X PUT -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"changes":{"dose":"2 g"},"reason":"escope probe"}' "$API/api/icu/orders/$MED")
          rc=$(echo "$out" | tail -1); [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "is not open" in e and "modifying an order" in e, e; print("modify on closed encounter -> 409 at the guard")'

      - name: MAR drops the discharged encounter's rows; documenting a dose → 409 at the chokepoint
        run: |
          curl -sf -H "Authorization: Bearer $NUR" "$API/api/icu/mar" \
            | MED="$MED" python3 -c '
          import json, sys, os
          ids = {r["orderId"] for r in json.load(sys.stdin)}
          assert os.environ["MED"] not in ids, "discharged encounter rows must not surface on the MAR"
          print("MAR no longer serves the discharged encounter")'
          # the guard sits BEFORE the dose lookup, so this is 409 (encounter
          # state), not 404 (dose already cancelled) — deliberate ordering
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' \
            -d '{"action":"given"}' "$API/api/icu/mar/$MED/administrations/$ADMID")
          rc=$(echo "$out" | tail -1); echo "administer after discharge -> HTTP $rc"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "is not open" in e and "documenting a dose" in e, e; print("precise 409:", e)'

      - name: Readmit the same MRN → same patient, NEW encounter, NO stale actives, new order scoped to the new encounter
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" -o /tmp/beds2.json
          B2=$(python3 -c 'import json; free=[b["bedId"] for b in json.load(open("/tmp/beds2.json")) if not b.get("patientId")]; assert free, "no free beds"; print(free[0])')
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"mrn":"'$MRN'","name":"E2E Encounter-Scope Patient","age":52,"sex":"M","allergies":"None documented","diagnosis":"readmission","attending":"Dr. E2E","bedId":"'$B2'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/readm.json
          vals=$(PID="$PID" EID="$EID" python3 -c '
          import json, os
          d = json.load(open("/tmp/readm.json"))
          assert d["patient"]["patientId"] == os.environ["PID"], d["patient"]   # same person, matched by MRN
          assert d["encounter"]["encounterId"] != os.environ["EID"]             # a NEW episode
          print(d["encounter"]["encounterId"])')
          EID2=$vals
          echo "readmitted $PID on NEW encounter $EID2"
          echo "EID2=$EID2" >> "$GITHUB_ENV"
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=$PID" \
            | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          stale = [(o["orderId"], o["status"]) for o in d if o["status"] in ("active", "pending")]
          assert not stale, stale                        # the prior admission surfaces NOTHING actionable
          assert len(d) >= 2                             # the longitudinal chart keeps the prior orders
          print("readmission: no stale actives;", len(d), "orders remain on the longitudinal chart")'
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"drafts":[{"patientId":"'$PID'","category":"Nursing","summary":"post-readmission order","priority":"Routine"}],"sign":true}' \
            "$API/api/icu/orders" -o /tmp/new.json
          EID2="$EID2" python3 -c '
          import json, os
          d = json.load(open("/tmp/new.json"))[0]
          assert d["encounterId"] == os.environ["EID2"], d.get("encounterId")
          print(d["orderId"], "scoped to the NEW encounter", d["encounterId"])'

      - name: Final discharge — the cascade closes out the readmission's order too (second cascade evidence)
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID2/discharge" >/dev/null
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=$PID" \
            | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          live = [(o["orderId"], o["status"]) for o in d if o["status"] in ("active", "pending")]
          assert not live, live
          print("both encounters closed — the run leaves NO active or pending order behind (cascade is the cleanup)")'

      - name: Failure-path cleanup — release THIS run's encounters (runs on failure/cancel too)
        if: always()
        run: |
          # A mid-run failure must not leak a bed-occupying open encounter
          # (2026-07-10 audit rule). The cascade rides along with each
          # discharge, so releasing the encounter also discontinues any
          # order the run left active — asserted, not assumed.
          if [ -z "${PID:-}" ] || [ -z "${DOC:-}" ]; then
            echo "no patient was admitted by this run — nothing to release"; exit 0
          fi
          open=$(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?patientId=$PID&status=open" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["encounterId"] if d else "")')
          if [ -n "$open" ]; then
            curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$open/discharge" >/dev/null \
              && echo "failure-path cleanup discharged $open" \
              || { echo "CLEANUP FAILED: could not release $open — a bed is leaked, manual action required"; exit 1; }
          else
            echo "no open encounter remains for $PID — nothing leaked"
          fi
          curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=$PID" \
            | python3 -c '
          import json, sys
          d = json.load(sys.stdin)
          live = [(o["orderId"], o["status"]) for o in d if o["status"] in ("active", "pending")]
          assert not live, ("cleanup left live orders:", live)
          print("cleanup verified: no active/pending order left on the run patient")'
