# CI — the repo's first pull_request-triggered checks (2026-07-10 CI
# evidence audit: no PR event ran anything, "green main" meant no workflow
# ran, and the C# server was compiled by NOTHING except Render's invisible
# post-merge build). Two jobs, both mandatory-by-presence on every PR and
# every push to main:
#   frontend — a REAL typecheck: `tsc -b --force` against the project
#     references (bare `tsc --noEmit` on the solution-style root tsconfig
#     is a no-op — the recorded PR #25 lesson), then the production
#     bundle build.
#   server — `dotnet build`: a C# compile error can no longer merge green.
name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # --force: full check, immune to any restored incremental build state
      - run: npx tsc -b --force
      - run: npx vite build

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet build server --nologo

  # TEMPORARY read-only staging diagnosis for the Recently Discharged
  # investigation — REMOVED from this branch before the PR is finalized.
  # Reads only; asserts the staging identity before touching anything.
  temp-discharge-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect the discharged-encounter list on staging (read-only)
        env:
          API: https://icu-cp49.onrender.com
        run: |
          got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))')
          echo "healthz environment: $got"
          [ "$got" = "staging" ] || { echo "WRONG ENVIRONMENT — refusing"; exit 1; }
          TOKEN=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
            -d '{"username":"sara.rahman","password":"Aurora2026!"}' \
            | python3 -c 'import json,sys;print(json.load(sys.stdin)["token"])')
          curl -sf -H "Authorization: Bearer $TOKEN" "$API/api/icu/adt/encounters" -o /tmp/all.json
          curl -sf -H "Authorization: Bearer $TOKEN" "$API/api/icu/adt/encounters?status=discharged" -o /tmp/disch.json
          python3 <<'PY'
          import json
          all_ = json.load(open('/tmp/all.json'))
          disch = json.load(open('/tmp/disch.json'))
          print(f"total encounters: {len(all_)} · discharged: {len(disch)}")
          print("\n--- exact rows for ENC-1193/1198 and ENC-1202..1210 (UNFILTERED list) ---")
          want = {f"ENC-{i}" for i in list(range(1202, 1211)) + [1193, 1198]}
          for e in all_:
              if e["encounterId"] in want:
                  print(f'{e["encounterId"]}: status={e["status"]!r} dischargedAt={e.get("dischargedAt")!r} '
                        f'dischargedBy={e.get("dischargedBy")!r} patient={e["patientId"]} {e["patientName"]!r}')
          print("\n--- what the panel renders: reverse(discharged)[:14] (server order preserved) ---")
          for e in list(reversed(disch))[:14]:
              print(f'{e["encounterId"]}: dischargedAt={e.get("dischargedAt")!r} {e["patientName"]!r}')
          print("\n--- stamp census over ALL discharged ---")
          dated = sum(1 for e in disch if len(e.get("dischargedAt") or "") >= 16)
          legacy = sum(1 for e in disch if 0 < len(e.get("dischargedAt") or "") < 16)
          absent = sum(1 for e in disch if not e.get("dischargedAt"))
          print(f"dated={dated} legacy(HH:mm)={legacy} absent={absent}")
          PY
