# Deployed Labs/Imaging E2E — verifies the LIVE Render service after a
# /server deploy. REWRITTEN by the results-audit PR to be SELF-SUFFICIENT
# per the codified finite-seeded-resources rule: the suite ADMITS ITS OWN
# PATIENT and CREATES THE RESULTS IT CONSUMES (the real result-creation
# endpoint, Ancillary RBAC), so the permanently-spent seeded-unacked well
# no longer exists as a dependency and the suite is idempotent against
# the durable database forever. Covers: seeded SUBSET reads + 401s +
# CORS, creation RBAC in both directions (tech 200, doctor/nurse 403),
# server-derived encounterId (client-supplied → 400 binding),
# acknowledge RBAC restored to automated coverage (nurse 403 / doctor
# 200 with token actor), un-acknowledge (never-destroy history, required
# reason, returns to inbox, replay 409 / absent-id 404), and THE ASYMMETRIC
# ENCOUNTER RULE live: create on a closed encounter → 409 (initiating
# care) while
# acknowledge AND un-acknowledge on that same closed encounter → 200
# (completing the record of care already given). Dispatch manually after
# merging /server changes to main — SEQUENTIALLY with the other suites.
name: Deployed Labs E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson): one shared group across all the
# suites means two can never RUN at once. GitHub keeps at most one
# PENDING run per group, so still dispatch one at a time.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  # The suite's DECLARED TARGET (environment-separation §11 step 1's
  # per-suite target table — in-file and versioned; there is
  # deliberately NO production entry to select). The environment gate
  # below refuses every leg unless /healthz reports this value.
  EXPECTED_ENV: staging
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the dispatched ref (FULL history — the gate resolves the DEPLOYED commit's objects)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is LOAD-BEARING: the gate runs `git rev-parse
          # "$build:server"` where $build is whatever commit Render is
          # serving — after a docs/workflow streak that can be arbitrarily
          # deep in history. The default fetch-depth: 1 has only HEAD's
          # objects, so the gate would fail loudly on EVERY run (safe but
          # useless). Full history also covers merge commits and any
          # main-ancestor the service may be serving.
          fetch-depth: 0

      - name: ENVIRONMENT GATE — a data-writing suite may only run against its declared target
        run: |
          # Environment-identity gate (§11 step 1 of the merged
          # environment-separation design): the freshness-gate mechanism
          # extended by one field. Asserted BEFORE the content gate, any
          # login, and any write leg. Retried: an UNREACHABLE healthz
          # (free-tier cold start) and an ABSENT field (a mid-deploy older
          # build — the content gate next would wait for the same deploy).
          # NOT retried: a PRESENT-but-different environment — a wrong
          # environment is not a warming-up condition; it fails
          # immediately and loudly, and no write leg ever runs.
          for i in $(seq 1 60); do
            got=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("environment","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: healthz environment=$got · expected=$EXPECTED_ENV"
            [ "$got" = "$EXPECTED_ENV" ] && exit 0
            if [ "$got" != "<unreachable>" ] && [ "$got" != "<absent>" ]; then
              echo "WRONG ENVIRONMENT: this suite writes test data for '$EXPECTED_ENV' but $API/healthz reports '$got' — refusing to run ANY leg." && exit 1
            fi
            sleep 10
          done
          echo "NO ENVIRONMENT IDENTITY: $API/healthz never reported an environment field (unreachable, or the deployed build predates the environment-identity PR) — refusing to run. Deploy this ref, then re-dispatch." && exit 1

      - name: Warm up + require the deployed build's SERVER CONTENT to equal this ref's
        run: |
          # THE GATE'S INVARIANT, refined once more (the merge-commit
          # lesson): the dispatched ref supplies the TEST code; the
          # deployed build supplies the SERVER code — they must agree
          # about the SERVER, and the honest form of that is CONTENT
          # equality of the build context, not commit identity. Commit
          # identity failed twice: HEAD==build broke on docs/workflow-only
          # merges (Render's rootDir filter never rebuilds), and
          # latest-server-touching-ancestor==build broke on MERGE commits
          # (git log attributes a change to the BRANCH commit while
          # Render deploys the MERGE commit — same tree, different ids).
          # So the gate compares git TREE/BLOB hashes of the build context
          # (server/ + render.yaml — the Dockerfile lives inside server/)
          # between the dispatched ref and the commit /healthz reports.
          # A deployed commit outside this ref's history fails rev-parse
          # → loud failure; newer server content on the ref than deployed
          # (the classic stale case) differs → loud failure.
          WANT_SRV=$(git rev-parse "$GITHUB_SHA:server")
          WANT_YML=$(git rev-parse "$GITHUB_SHA:render.yaml")
          echo "dispatched ref HEAD: $GITHUB_SHA"
          echo "expected build context: server tree $WANT_SRV · render.yaml blob $WANT_YML"
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            BS=$(git rev-parse -q --verify "$build:server" 2>/dev/null || echo "<unknown-commit>")
            BY=$(git rev-parse -q --verify "$build:render.yaml" 2>/dev/null || echo "<unknown-commit>")
            echo "attempt $i: live build=$build · its server tree=$BS"
            [ "$BS" = "$WANT_SRV" ] && [ "$BY" = "$WANT_YML" ] && exit 0
            sleep 10
          done
          if [ "$BS" = "$WANT_SRV" ] && [ "$BY" != "$WANT_YML" ]; then
            echo "CONFIG MISMATCH: server/ trees are EQUAL but render.yaml differs between this ref and the deployed build '$build'." \
              "If the render.yaml change was semantic (env vars/build config), Render's Blueprint sync should have redeployed — check the dashboard." \
              "If Render did not redeploy (e.g. a comment-only edit), trigger a MANUAL DEPLOY of the latest commit to clear this gate — an expected operational step, not a dead zone." && exit 1
          fi
          echo "STALE DEPLOYMENT: the deployed build '$build' (server tree $BS) does not carry this ref's server content (expected tree $WANT_SRV) — refusing to run the suite against a different server" && exit 1

      - name: Login as doctor, nurse, and laboratory technician
        run: |
          for u in sara.rahman maya.chen noor.al-amin; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman)  echo "DOC=$t"  >> "$GITHUB_ENV";;
              maya.chen)    echo "NUR=$t"  >> "$GITHUB_ENV";;
              noor.al-amin) echo "TECH=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Unauthenticated reads → 401; seeded reads are a SUBSET (+ CORS)
        run: |
          for path in "/api/icu/results/labs?patientId=P-1001" "/api/icu/results/imaging?patientId=P-1001" "/api/icu/results/inbox"; do
            rc=$(curl -s -o /dev/null -w '%{http_code}' "$API$path")
            echo "unauth $path -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          done
          curl -sf -D /tmp/h -H "Authorization: Bearer $DOC" -H "Origin: $PAGES_ORIGIN" \
            "$API/api/icu/results/labs?patientId=P-1001" -o /tmp/labs.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/labs.json"))
          by={x["labId"]:x for x in d}
          assert len(d)>=49, len(d)                                # subset rule — never an exact count
          l=by["LAB-6001"]
          assert l["panel"]=="CBC" and l["encounterId"]=="ENC-1001", l
          print("P-1001 labs:", len(d), "draws (seeded subset present; rows scoped to their encounter)")'
          curl -sf -H "Authorization: Bearer $NUR" "$API/api/icu/results/imaging?patientId=P-1001" | python3 -c '
          import json,sys; d={x["studyId"]:x for x in json.load(sys.stdin)}
          assert "IMG-7001" in d and d["IMG-7001"]["encounterId"]=="ENC-1001"
          print("imaging seeded subset present (nurse read OK)")'

      - name: Admit THIS RUN's patient (unique MRN, dynamic free bed)
        run: |
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/adt/beds" -o /tmp/beds.json
          B1=$(python3 -c 'import json; free=[b["bedId"] for b in json.load(open("/tmp/beds.json")) if not b.get("patientId")]; assert free, "no free beds — discharge stale encounters"; print(free[0])')
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"nameFirst":"E2E","nameSecond":"Labs","nameFamily":"Patient","age":58,"sex":"F","allergies":"None documented","diagnosis":"labs E2E","attending":"Dr. E2E","bedId":"'$B1'"}' \
            "$API/api/icu/adt/admissions" -o /tmp/adm.json
          vals=$(python3 -c 'import json; d=json.load(open("/tmp/adm.json")); print(d["patient"]["patientId"], d["encounter"]["encounterId"])')
          read PID EID <<<"$vals"
          echo "admitted $PID on $EID (bed $B1)"
          { echo "PID=$PID"; echo "EID=$EID"; } >> "$GITHUB_ENV"

      - name: Creation RBAC both directions — doctor/nurse 403, unauth 401; TECH creates (encounterId server-derived)
        run: |
          body='{"patientId":"'$PID'","panel":"CBC","label":"Now","note":"labs E2E created result","items":[{"analyte":"WBC","value":18.4,"unit":"x10^9/L","refRange":"4.0-11.0","refLow":4,"refHigh":11,"flag":"abnormal"},{"analyte":"Hgb","value":6.9,"unit":"g/dL","refRange":"12-16","refLow":12,"refHigh":16,"flag":"critical"}]}'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/results/labs")
          echo "doctor create -> HTTP $rc"; [ "$rc" = "403" ] || { echo "doctor create must be 403 (producing-service authority)"; exit 1; }
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/results/labs")
          echo "nurse create -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d "$body" "$API/api/icu/results/labs")
          echo "unauth create -> HTTP $rc"; [ "$rc" = "401" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/results/labs" -o /tmp/lab.json
          LABID=$(EID="$EID" python3 -c '
          import json, os
          d = json.load(open("/tmp/lab.json"))
          assert d["encounterId"] == os.environ["EID"], d.get("encounterId")   # server-derived scope
          assert d["acknowledged"] is False and "acknowledgedBy" not in d
          assert d["flag"] == "critical"                                        # derived from the worst item
          assert [e["action"] for e in d["history"]] == ["resulted"]
          assert d["history"][0]["actor"] == "Noor Al-Amin"                     # token actor
          print(d["labId"])')
          curl -sf -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","modality":"CXR","description":"Portable chest — labs E2E","report":"Lines satisfactory.","impression":"No acute change.","flag":"normal"}' \
            "$API/api/icu/results/imaging" -o /tmp/img.json
          IMGID=$(EID="$EID" python3 -c '
          import json, os
          d = json.load(open("/tmp/img.json"))
          assert d["encounterId"] == os.environ["EID"] and d["status"] == "final" and d["acknowledged"] is False
          print(d["studyId"])')
          echo "tech created $LABID (lab) + $IMGID (imaging), both scoped to $EID, both unacknowledged"
          { echo "LABID=$LABID"; echo "IMGID=$IMGID"; } >> "$GITHUB_ENV"

      - name: encounterId is STRICTLY SERVER-DERIVED — supplying it fails binding (400); malformed → precise 400
        run: |
          for body in \
            '{"patientId":"'$PID'","encounterId":"ENC-1001","panel":"CBC","label":"Now","items":[{"analyte":"W","value":5,"unit":"x","refRange":"1-2","refLow":1,"refHigh":2,"flag":"normal"}]}' \
            '{"patientId":"'$PID'","panel":"CBC","label":"Now","items":[{"analyte":"W","value":5,"unit":"x","refRange":"1-2","refLow":1,"refHigh":2,"flag":"normal","encounterId":"ENC-1001"}]}'; do
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' -d "$body" "$API/api/icu/results/labs")
            echo "create with client-supplied encounterId -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          done
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","panel":"Chemistry","label":"Now","items":[{"analyte":"W","value":5,"unit":"x","refRange":"1-2","refLow":1,"refHigh":2,"flag":"normal"}]}' "$API/api/icu/results/labs")
          rc=$(echo "$out" | tail -1); [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "panel must be one of" || exit 1
          echo "unknown panel -> 400 with the precise vocabulary error"
          # ABSENCE PROBE (the coverage lesson, owed by this suite): the
          # suite otherwise creates results only for its OWN admitted
          # patient, so the unknown-patient path was never exercised
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d '{"patientId":"P-9999","panel":"CBC","label":"Now","items":[{"analyte":"WBC","value":5,"unit":"x","refRange":"1-2","refLow":1,"refHigh":2,"flag":"normal"}]}' \
            "$API/api/icu/results/labs")
          rc=$(echo "$out" | tail -1); echo "create result for UNKNOWN patient -> HTTP $rc"; [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "does not match any roster patient" in e, e; print("400:", e)'

      - name: Acknowledge RBAC restored to automated coverage — nurse 403, doctor 200 (token actor)
        run: |
          curl -sf -H "Authorization: Bearer $NUR" "$API/api/icu/results/inbox" | LABID="$LABID" python3 -c '
          import json,sys,os; assert os.environ["LABID"] in {i["id"] for i in json.load(sys.stdin)}
          print("created result is in the unit inbox")'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" "$API/api/icu/results/labs/$LABID/acknowledge")
          echo "nurse acknowledge -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/labs/$LABID/acknowledge" | python3 -c '
          import json,sys; d=json.load(sys.stdin)
          assert d["acknowledged"] is True and d["acknowledgedBy"]=="Dr. Sara Rahman"
          assert [e["action"] for e in d["history"]] == ["resulted","acknowledged"]
          print("doctor acknowledged; actor from token; event appended")'
          # replay is a STATE CONFLICT, not absence — the result exists, already acknowledged
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/labs/$LABID/acknowledge")
          rc=$(echo "$out" | tail -1); echo "replay acknowledge -> HTTP $rc"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "already acknowledged" in e, e'


      - name: Un-acknowledge — nurse 403; missing reason 400; doctor+reason 200 (NEVER-DESTROY history, back in inbox); replay 409, absent id 404
        run: |
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $NUR" -H 'Content-Type: application/json' -d '{"reason":"x"}' "$API/api/icu/results/labs/$LABID/unacknowledge")
          echo "nurse un-acknowledge -> HTTP $rc"; [ "$rc" = "403" ] || exit 1
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{}' "$API/api/icu/results/labs/$LABID/unacknowledge")
          rc=$(echo "$out" | tail -1); [ "$rc" = "400" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | grep -q "reason is required" || exit 1
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"reason":"acknowledged in error — labs E2E reversal"}' "$API/api/icu/results/labs/$LABID/unacknowledge" | python3 -c '
          import json,sys; d=json.load(sys.stdin)
          acts=[e["action"] for e in d["history"]]
          assert d["acknowledged"] is False and "acknowledgedBy" not in d
          assert acts == ["resulted","acknowledged","unacknowledged"], acts
          assert d["history"][1]["actor"] == "Dr. Sara Rahman"                       # the ORIGINAL acknowledgment, preserved
          assert "acknowledgment by Dr. Sara Rahman" in d["history"][2]["detail"]
          assert "labs E2E reversal" in d["history"][2]["detail"]
          print("reversal audited with reason; original acknowledgment preserved; summary cleared")'
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/results/inbox" | LABID="$LABID" python3 -c '
          import json,sys,os; assert os.environ["LABID"] in {i["id"] for i in json.load(sys.stdin)}
          print("result RETURNED to the inbox")'
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"reason":"x"}' "$API/api/icu/results/labs/$LABID/unacknowledge")
          rc=$(echo "$out" | tail -1); echo "replay un-acknowledge -> HTTP $rc (state conflict, not absence)"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "is not acknowledged" in e and "no acknowledgment to reverse" in e, e'
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' -d '{"reason":"x"}' "$API/api/icu/results/labs/LAB-0000/unacknowledge")
          echo "un-acknowledge of a NONEXISTENT id -> HTTP $rc"; [ "$rc" = "404" ] || exit 1   # 404 stays reserved for absence

      # RUNS BEFORE the discharge step DELIBERATELY (the #141 sequencing
      # lesson): ordering needs this run's encounter still OPEN.
      - name: CORRECTED IMAGING MODEL — free-text study add (no code typed) → order with region+contrast (assembled summary) → report → Completed; dup 409; old baked fields now 400; cleanup retires the run study
        run: |
          STUDYNAME="E2E CT Scan $GITHUB_RUN_ID"
          # 1) ADD: name + modality ONLY — the id is system-generated, never typed
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"name\":\"$STUDYNAME\",\"modality\":\"CT\"}" "$API/api/icu/imaging-catalog" -o /tmp/study.json
          SID=$(NAME="$STUDYNAME" python3 -c '
          import json,os
          d=json.load(open("/tmp/study.json"))
          assert d["name"]==os.environ["NAME"] and d["modality"]=="CT" and d["active"] is True, d
          assert d["studyId"].startswith("img_"), d["studyId"]      # generated internal key
          assert "region" not in d and "contrast" not in d and "portable" not in d, d
          print(d["studyId"])')
          echo "added '$STUDYNAME' -> generated id $SID"
          # duplicate ACTIVE name -> 409 naming it
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"name\":\"$STUDYNAME\",\"modality\":\"CT\"}" "$API/api/icu/imaging-catalog")
          echo "duplicate active name -> HTTP $rc"; [ "$rc" = "409" ] || exit 1
          # the OLD model's baked-in fields are a contract error now (Disallow)
          for body in '{"name":"E2E bad","modality":"CT","region":"Head"}' \
                      '{"name":"E2E bad","modality":"CT","portable":true}' \
                      '{"studyId":"e2e_bad","name":"E2E bad","modality":"CT"}'; do
            rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
              -d "$body" "$API/api/icu/imaging-catalog")
            echo "old-model field on create -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          done
          # 2) ORDERABLE IMMEDIATELY, specifics at ORDER time: free-text region +
          # one contrast tick; no summary sent -> the server assembles it
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Imaging\",\"studyId\":\"$SID\",\"region\":\"head\",\"contrast\":true,\"priority\":\"STAT\"}],\"sign\":true}" \
            "$API/api/icu/orders" -o /tmp/imgorder.json
          OID=$(NAME="$STUDYNAME" python3 -c '
          import json,os
          d=json.load(open("/tmp/imgorder.json"))[0]
          n=os.environ["NAME"]
          assert d["summary"]==n+" — head — with contrast", d["summary"]
          assert d["region"]=="head" and d["contrast"] is True and d["status"]=="active", d
          print(d["orderId"])')
          echo "ordered: $OID renders assembled '$STUDYNAME — head — with contrast'"
          # region/contrast are Imaging-only SHAPE (400 on a Lab draft)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Lab\",\"summary\":\"x\",\"region\":\"head\",\"priority\":\"Routine\"}],\"sign\":false}" "$API/api/icu/orders")
          echo "region on a Lab draft -> HTTP $rc"; [ "$rc" = "400" ] || exit 1
          # 3) RESULTABLE IMMEDIATELY: the clinician documents the paper report
          # against the order (/document, the #105 linked form) — the report
          # INHERITS the assembled description from the order
          NOWSTAMP=$(date -u +"%Y-%m-%d %H:%M")
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"patientId\":\"$PID\",\"orderId\":\"$OID\",\"modality\":\"CT\",\"performedAt\":\"$NOWSTAMP\",\"findings\":\"No acute finding.\",\"impression\":\"Unremarkable.\",\"reportingRadiologist\":\"Dr. E2E Radiology\",\"critical\":false}" \
            "$API/api/icu/results/imaging/document" -o /tmp/imgrep.json
          RID=$(OID="$OID" NAME="$STUDYNAME" python3 -c '
          import json,os; d=json.load(open("/tmp/imgrep.json"))
          assert d["orderId"]==os.environ["OID"], d
          assert d["description"]==os.environ["NAME"]+" — head — with contrast", d["description"]
          print(d["studyId"])')
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/orders?patientId=$PID&status=completed" \
            | OID="$OID" python3 -c '
          import json,sys,os
          ids={o["orderId"] for o in json.load(sys.stdin)}
          assert os.environ["OID"] in ids, ids
          print("the order reflects COMPLETED via its linked report — the full loop, no code change")'
          # 4) cleanup: a referenced study is never deleted (409 directing retire) -> retire it;
          # acknowledge the run report (no inbox accumulation)
          rc=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -H "Authorization: Bearer $DOC" "$API/api/icu/imaging-catalog/$SID")
          echo "delete referenced study -> HTTP $rc"; [ "$rc" = "409" ] || exit 1
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/imaging-catalog/$SID/deactivate" >/dev/null && echo "run study retired (off the menu; the order keeps rendering)"
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/imaging/$RID/acknowledge" >/dev/null && echo "run report acknowledged"

      - name: LAB FREE-TEXT ADD → order → result — the same loop holds for labs (name with a SPACE, no id typed)
        run: |
          LABNAME="E2E Blood Gas $GITHUB_RUN_ID"
          # name only — the panel key derives from it (spaces legal now; the old
          # letters/digits/hyphen rule is gone). TECH = the Laboratory (Ancillary
          # holds labcatalog.manage).
          curl -sf -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d "{\"name\":\"$LABNAME\",\"category\":\"Chemistry\",\"specimen\":\"Arterial blood\",\"analytes\":[{\"analyte\":\"pH\",\"unit\":\"\",\"refRange\":\"7.35-7.45\",\"refLow\":7.35,\"refHigh\":7.45}]}" \
            "$API/api/icu/lab-catalog" -o /tmp/newtest.json
          NAME="$LABNAME" python3 -c '
          import json,os; d=json.load(open("/tmp/newtest.json"))
          assert d["testId"]==os.environ["NAME"] and d["name"]==os.environ["NAME"] and d["active"] is True, d
          print("lab test added — the typed name IS the panel key:", d["testId"])'
          # orderable immediately
          LOID=$(curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d "{\"drafts\":[{\"patientId\":\"$PID\",\"category\":\"Lab\",\"summary\":\"$LABNAME now\",\"testId\":\"$LABNAME\",\"priority\":\"STAT\"}],\"sign\":true}" \
            "$API/api/icu/orders" | python3 -c 'import json,sys; print(json.load(sys.stdin)[0]["orderId"])')
          # resultable immediately (the documentation path validates panel against the catalogue)
          NLID=$(curl -sf -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d "{\"patientId\":\"$PID\",\"panel\":\"$LABNAME\",\"label\":\"Now\",\"note\":\"free-text loop\",\"items\":[{\"analyte\":\"pH\",\"value\":7.4,\"unit\":\"\",\"refRange\":\"7.35-7.45\",\"refLow\":7.35,\"refHigh\":7.45,\"flag\":\"normal\"}]}" \
            "$API/api/icu/results/labs" | python3 -c 'import json,sys; print(json.load(sys.stdin)["labId"])')
          echo "lab loop: added '$LABNAME' -> ordered $LOID -> resulted $NLID"
          # cleanup: acknowledge the result; retire the run test (referenced -> never deleted)
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/labs/$NLID/acknowledge" >/dev/null
          ENC_NAME=$(LN="$LABNAME" python3 -c 'import urllib.parse,os; print(urllib.parse.quote(os.environ["LN"]))')
          curl -sf -X POST -H "Authorization: Bearer $TECH" "$API/api/icu/lab-catalog/$ENC_NAME/deactivate" >/dev/null && echo "run lab test retired"

      - name: THE ASYMMETRIC ENCOUNTER RULE, live — discharge; create → 409; acknowledge AND un-acknowledge on the CLOSED encounter → 200
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$EID/discharge" >/dev/null && echo "discharged $EID"
          # creating a NEW result is initiating care -> 409 at the chokepoint
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $TECH" -H 'Content-Type: application/json' \
            -d '{"patientId":"'$PID'","panel":"CBC","label":"Now","items":[{"analyte":"W","value":5,"unit":"x","refRange":"1-2","refLow":1,"refHigh":2,"flag":"normal"}]}' "$API/api/icu/results/labs")
          rc=$(echo "$out" | tail -1); echo "create on closed encounter -> HTTP $rc"
          [ "$rc" = "409" ] || { echo "$out"; exit 1; }
          echo "$out" | head -1 | python3 -c 'import json,sys; e=json.load(sys.stdin)["error"]; assert "has no open encounter" in e and "creating a lab result" in e, e'
          # acknowledging / reversing is COMPLETING THE RECORD -> must succeed (the day-3-draw/day-7-result case)
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/labs/$LABID/acknowledge" >/dev/null \
            && echo "acknowledge on the CLOSED encounter -> 200"
          curl -sf -X POST -H "Authorization: Bearer $DOC" -H 'Content-Type: application/json' \
            -d '{"reason":"post-discharge review — labs E2E"}' "$API/api/icu/results/labs/$LABID/unacknowledge" >/dev/null \
            && echo "un-acknowledge on the CLOSED encounter -> 200"
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/imaging/$IMGID/acknowledge" >/dev/null \
            && echo "imaging acknowledge on the CLOSED encounter -> 200"
          # leave everything acknowledged: the run must not accumulate inbox noise
          curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/labs/$LABID/acknowledge" >/dev/null
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/results/inbox" | LABID="$LABID" IMGID="$IMGID" python3 -c '
          import json,sys,os
          ids={i["id"] for i in json.load(sys.stdin)}
          assert os.environ["LABID"] not in ids and os.environ["IMGID"] not in ids
          print("run results all acknowledged — no inbox accumulation left behind")'

      - name: Failure-path cleanup — release the encounter and acknowledge the run's results (runs on failure/cancel too)
        if: always()
        run: |
          # Both cleanup actions are legal on a CLOSED encounter by design:
          # discharge releases the bed; acknowledging a result is completing
          # the record. Asserted, not assumed.
          if [ -z "${PID:-}" ] || [ -z "${DOC:-}" ]; then
            echo "no patient was admitted by this run — nothing to release"; exit 0
          fi
          open=$(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters?patientId=$PID&status=open" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d[0]["encounterId"] if d else "")')
          if [ -n "$open" ]; then
            curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/adt/encounters/$open/discharge" >/dev/null \
              && echo "failure-path cleanup discharged $open" \
              || { echo "CLEANUP FAILED: could not release $open — a bed is leaked"; exit 1; }
          else
            echo "no open encounter remains for $PID"
          fi
          # acknowledge any of the run's results still in the inbox (legal on the closed encounter)
          for entry in $(curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/results/inbox" | PID="$PID" python3 -c '
          import json,sys,os
          items=[i["kind"]+":"+i["id"] for i in json.load(sys.stdin) if i["patientId"]==os.environ["PID"]]
          print(" ".join(items))'); do
            kind="${entry%%:*}"; rid="${entry##*:}"
            path=$([ "$kind" = "lab" ] && echo labs || echo imaging)
            curl -sf -X POST -H "Authorization: Bearer $DOC" "$API/api/icu/results/$path/$rid/acknowledge" >/dev/null \
              && echo "cleanup acknowledged $rid" || { echo "CLEANUP FAILED on $rid"; exit 1; }
          done
          curl -s -H "Authorization: Bearer $DOC" "$API/api/icu/results/inbox" | PID="$PID" python3 -c '
          import json,sys,os
          left=[i["id"] for i in json.load(sys.stdin) if i["patientId"]==os.environ["PID"]]
          assert not left, ("cleanup left unacknowledged run results:", left)
          print("cleanup verified: no unacknowledged run result remains in the unit inbox")'
