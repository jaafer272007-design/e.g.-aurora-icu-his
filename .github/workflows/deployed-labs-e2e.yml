# Deployed Labs/Imaging E2E — verifies the LIVE Render service after a
# /server deploy (Stage 10 Phase 3): authenticated lab/imaging/inbox
# fetches return the real seeded data, unauthenticated calls are 401, and
# the acknowledge action enforces RBAC SERVER-SIDE — a nurse token is
# rejected with 403 while a doctor token succeeds (actor taken from the
# token). Dispatch manually after merging /server changes to main.
#
# IDEMPOTENT UNDER PERSISTENCE (fixed in the database-persistence PR):
# the acknowledge target is picked DYNAMICALLY from the unacked inbox each
# run — the original hardcoded LAB-6007 could only ever be acknowledged
# once against a durable database (it "worked" before only because the
# ephemeral DB reseeded on every boot). With 73 seeded draws the suite has
# a deep well of targets; when none remain it fails LOUDLY with a clear
# message instead of a confusing 404.
name: Deployed Labs E2E
on: workflow_dispatch

# STRUCTURAL serialization of the deployed suites (the recorded
# never-dispatch-concurrently lesson, previously enforced only by memory):
# one shared group across all eight suites means two can never RUN at
# once. GitHub keeps at most one PENDING run per group, so still dispatch
# one at a time — a second queued dispatch may supersede a waiting one.
concurrency:
  group: deployed-e2e
  cancel-in-progress: false

env:
  API: https://icu-cp49.onrender.com
  PAGES_ORIGIN: https://jaafer272007-design.github.io

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up + require THIS COMMIT's build to be live (no stale deployments)
        run: |
          # /healthz serves the deployed commit in `build` (RENDER_GIT_COMMIT).
          # The suite REFUSES to run against any other build, so a green run
          # is attributable to exactly the commit it was dispatched on — a
          # suite can never again test a stale deployment and report green
          # (the 2026-07-10 CI-evidence audit's biggest finding). 60x10s also
          # covers the Render cold start + a full rebuild after a merge.
          for i in $(seq 1 60); do
            build=$(curl -s --max-time 30 "$API/healthz" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("build","<absent>"))' 2>/dev/null || echo "<unreachable>")
            echo "attempt $i: live build=$build · dispatched commit=$GITHUB_SHA"
            [ "$build" = "$GITHUB_SHA" ] && exit 0
            sleep 10
          done
          echo "STALE DEPLOYMENT: /healthz build '$build' never matched the dispatched commit '$GITHUB_SHA' — refusing to test an old build" && exit 1

      - name: Login as doctor and nurse
        run: |
          for u in sara.rahman maya.chen; do
            t=$(curl -sf -X POST "$API/api/auth/login" -H "Content-Type: application/json" \
              -d "{\"username\":\"$u\",\"password\":\"Aurora2026!\"}" \
              | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
            case $u in
              sara.rahman) echo "DOC=$t" >> "$GITHUB_ENV";;
              maya.chen)   echo "NUR=$t" >> "$GITHUB_ENV";;
            esac
            echo "$u: token issued"
          done

      - name: Unauthenticated labs/imaging/inbox → 401
        run: |
          for path in "results/labs?patientId=P-1001" "results/imaging?patientId=P-1001" "results/inbox"; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$API/api/icu/$path")
            echo "$path -> HTTP $code"
            [ "$code" = "401" ] || exit 1
          done

      - name: Authenticated lab fetch returns real seeded data (+ CORS)
        run: |
          curl -sf -D /tmp/h -H "Authorization: Bearer $DOC" -H "Origin: $PAGES_ORIGIN" \
            "$API/api/icu/results/labs?patientId=P-1001" -o /tmp/labs.json
          grep -i "^access-control-allow-origin: $PAGES_ORIGIN" /tmp/h
          python3 -c '
          import json; d=json.load(open("/tmp/labs.json"))
          # SUBSET assertion (codified rule) — never an exact count: the
          # durable DB legitimately grows when lab creation ships. Lookup
          # by id, not position: future ids can sort before LAB-6xxx.
          assert len(d)>=49, len(d)
          byid={x["labId"]: x for x in d}
          assert "LAB-6001" in byid and byid["LAB-6001"]["panel"]=="CBC", "seeded LAB-6001 missing/wrong"
          unacked=[x["labId"] for x in d if not x["acknowledged"]]
          print("draws:", len(d), "| unacked:", unacked)'
          curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/results/imaging?patientId=P-1012" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d[0]["studyId"]=="IMG-7004", d; print("imaging OK:", d[0]["studyId"], d[0]["status"])'

      - name: Pick an UNACKED lab for THIS RUN (idempotent under persistence)
        run: |
          LID=$(curl -sf -H "Authorization: Bearer $DOC" "$API/api/icu/results/inbox" \
            | python3 -c 'import json,sys; labs=[x for x in json.load(sys.stdin) if x["kind"]=="lab"]; assert labs, "no unacknowledged labs remain on the persistent DB — extend the seed set or reset the database"; print(labs[0]["id"])')
          echo "acknowledge target: $LID"
          echo "LID=$LID" >> "$GITHUB_ENV"

      - name: NURSE token rejected for acknowledge (server-side RBAC) → 403
        run: |
          out=$(curl -s -w '\n%{http_code}' -X POST -H "Authorization: Bearer $NUR" \
            "$API/api/icu/results/labs/$LID/acknowledge")
          echo "nurse acknowledge -> $out"
          [ "$(echo "$out" | tail -1)" = "403" ] || exit 1
          echo "$out" | head -1 | grep -q '"Insufficient permissions"' || exit 1

      - name: DOCTOR token succeeds for acknowledge (actor from token), replay → 404
        run: |
          curl -sf -X POST -H "Authorization: Bearer $DOC" \
            "$API/api/icu/results/labs/$LID/acknowledge" \
            | python3 -c 'import json,sys; d=json.load(sys.stdin); assert d["acknowledged"] and d["acknowledgedBy"]=="Dr. Sara Rahman", d; print("acknowledged by:", d["acknowledgedBy"], "at:", d["acknowledgedAt"])'
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H "Authorization: Bearer $DOC" \
            "$API/api/icu/results/labs/$LID/acknowledge")
          echo "replay -> HTTP $code"
          [ "$code" = "404" ] || exit 1
